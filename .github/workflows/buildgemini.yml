name: Build Gemini (with Icon & Fixed Status Bar)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create polyfills and loader
        run: |
          mkdir -p patches
          
          cat > patches/polyfills.js << 'POLYFILLS_EOF'
          (function(w){
            if (!w.MediaQueryList || w.MediaQueryList.prototype.addEventListener) return;
            function getProto() {
              if (w.MediaQueryList) return w.MediaQueryList.prototype;
              if (typeof w.matchMedia === "function") {
                var mql = w.matchMedia("all");
                return Object.getPrototypeOf(mql);
              }
            }
            var proto = getProto();
            if (!proto) return;
            var wrappers = new WeakMap();
            proto.addEventListener = function(type, listener) {
              if (type !== "change") return;
              if (typeof listener === "function") {
                proto.addListener.call(this, listener);
              } else {
                var wrapper = wrappers.get(listener);
                if (!wrapper) {
                  wrapper = function(ev) { listener.handleEvent(ev); };
                  wrappers.set(listener, wrapper);
                }
                proto.addListener.call(this, wrapper);
              }
            };
            proto.removeEventListener = function(type, listener) {
              if (type !== "change") return;
              if (typeof listener === "function") {
                proto.removeListener.call(this, listener);
              } else {
                var wrapper = wrappers.get(listener);
                if (!wrapper) return;
                proto.removeListener.call(this, wrapper);
              }
            };
          })(window);
          
          if (!window.queueMicrotask) {
            window.queueMicrotask = function(cb) { Promise.resolve().then(cb); };
          }
          
          if (!Promise.withResolvers) {
            Promise.withResolvers = function() {
              var resolve, reject;
              var promise = new Promise(function(res, rej) { resolve = res; reject = rej; });
              return { promise: promise, resolve: resolve, reject: reject };
            };
          }
          
          if (!Array.prototype.at) {
            Array.prototype.at = function(idx) {
              var len = this.length;
              var i = idx >= 0 ? idx : len + idx;
              return (i < 0 || i >= len) ? undefined : this[i];
            };
          }
          
          if (!String.prototype.at) {
            String.prototype.at = function(idx) {
              var len = this.length;
              var i = idx >= 0 ? idx : len + idx;
              return (i < 0 || i >= len) ? undefined : this[i];
            };
          }
          
          if (!Object.hasOwn) {
            Object.hasOwn = function(obj, prop) {
              return Object.prototype.hasOwnProperty.call(obj, prop);
            };
          }
          
          if (!Promise.any) {
            Promise.any = function(promises) {
              return new Promise(function(resolve, reject) {
                var errors = [];
                var pending = promises.length;
                if (pending === 0) { reject(new AggregateError([], "All rejected")); return; }
                for (var i = 0; i < promises.length; i++) {
                  Promise.resolve(promises[i]).then(resolve, function(err) {
                    errors[i] = err;
                    if (--pending === 0) reject(new AggregateError(errors, "All rejected"));
                  });
                }
              });
            };
          }
          
          if (!String.prototype.replaceAll) {
            String.prototype.replaceAll = function(search, replacement) {
              if (typeof search === "string") return this.split(search).join(replacement);
              if (search instanceof RegExp) {
                if (!search.global) throw new TypeError("Global RegExp required");
                return this.replace(search, replacement);
              }
              return this.replace(search, replacement);
            };
          }
          
          if (typeof AggregateError === "undefined") {
            window.AggregateError = function(errors, message) {
              var e = new Error(message);
              e.errors = errors;
              e.name = "AggregateError";
              return e;
            };
          }
          POLYFILLS_EOF
          
          cat > patches/loader.js << 'LOADER_EOF'
          (function() {
            var iosMatch = navigator.userAgent.match(/OS (\d+)_(\d+)/);
            var iosVersion = iosMatch ? iosMatch[1] + "." + iosMatch[2] : "15.0";
            var cache = new Map();
            
            if (typeof window.LegacyTranspiler === "undefined") return;
            
            window.LegacyTranspiler.init({
              BASE_URL: window.location.origin,
              runScript: function(code) {
                try {
                  var script = document.createElement("script");
                  script.textContent = code;
                  (document.head || document.documentElement).appendChild(script);
                  script.remove();
                } catch(e) {}
              },
              target: { platform: "iOS", version: iosVersion },
              minify: true
            });
            
            var processedScripts = new Set();
            var observer = new MutationObserver(function(mutations) {
              for (var i = 0; i < mutations.length; i++) {
                var nodes = mutations[i].addedNodes;
                for (var j = 0; j < nodes.length; j++) {
                  var node = nodes[j];
                  if (node.tagName === "SCRIPT") {
                    if (node.src && !processedScripts.has(node.src)) {
                      processedScripts.add(node.src);
                      node.type = "javascript/blocked";
                      if (cache.has(node.src)) {
                        window.LegacyTranspiler.runScript(cache.get(node.src));
                      } else {
                        window.LegacyTranspiler.loadCode(node.src).then(function(code) {
                          if (code) cache.set(node.src, code);
                        });
                      }
                    }
                    else if (!node.src && node.textContent && node.type !== "javascript/blocked") {
                      var content = node.textContent;
                      if (content.indexOf('??') > -1 || content.indexOf('||=') > -1 || 
                          content.indexOf('&&=') > -1 || content.indexOf('#') > -1 ||
                          content.indexOf('class ') > -1) {
                        node.type = "javascript/blocked";
                        try {
                          var transpiled = window.LegacyTranspiler.transpile("inline", content);
                          var newScript = document.createElement("script");
                          newScript.textContent = transpiled;
                          node.parentNode.replaceChild(newScript, node);
                        } catch(e) {}
                      }
                    }
                  }
                }
              }
            });
            observer.observe(document.documentElement, { childList: true, subtree: true });
          })();
          LOADER_EOF
          
          echo "Patches created"

      - name: Create app bundle and copy resources
        run: |
          APP_NAME="Gemini"
          mkdir -p Payload/${APP_NAME}.app
          cp patches/*.js Payload/${APP_NAME}.app/ 2>/dev/null || true
          
          # Copy icon files from repo root if they exist
          for icon in Icon-60@2x.png Icon-60@3x.png Icon-76.png Icon-76@2x.png Icon-40.png Icon-40@2x.png; do
            if [ -f "$icon" ]; then
              cp "$icon" Payload/${APP_NAME}.app/
              echo "Copied $icon"
            fi
          done

      - name: Generate Swift source (with fixed status bar)
        run: |
          cat > app.swift << 'SWIFT'
          import UIKit
          import WebKit
          import AVFoundation

          class ViewController: UIViewController, WKNavigationDelegate, WKUIDelegate, WKScriptMessageHandler, WKDownloadDelegate {
              
              var webView: WKWebView!
              var statusBarStyle = false
              var currentDownload: WKDownload?
              var currentDownloadDestinationURL: URL?

              override var preferredStatusBarStyle: UIStatusBarStyle {
                  return statusBarStyle ? .lightContent : .darkContent
              }

              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = UIColor.white
                  
                  AVCaptureDevice.requestAccess(for: .audio) { _ in }
                  
                  let config = WKWebViewConfiguration()
                  config.userContentController.add(self, name: "themeHandler")
                  config.allowsInlineMediaPlayback = true
                  config.mediaTypesRequiringUserActionForPlayback = []
                  config.websiteDataStore = .default()
                  
                  let bundle = Bundle.main
                  for file in ["polyfills", "loader"] {
                      if let path = bundle.path(forResource: file, ofType: "js"),
                         let js = try? String(contentsOfFile: path, encoding: .utf8) {
                          let script = WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                          config.userContentController.addUserScript(script)
                      }
                  }
                  
                  if let path = bundle.path(forResource: "legacy-transpiler", ofType: "js"),
                     let js = try? String(contentsOfFile: path, encoding: .utf8) {
                      let script = WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                      config.userContentController.addUserScript(script)
                  }
                  
                  // Banner hider for Gemini
                  let bannerHiderJS = """
                  (function() {
                      var interval, observer, hidden=false;
                      function hideBanners(){
                          if(hidden) return;
                          var selectors=['[class*="download"]','[class*="banner"]','[class*="app-store"]','[class*="promo"]','[class*="cta"]','.google-banner','.install-banner'];
                          var found=false;
                          for(var i=0;i<selectors.length;i++){
                              var els=document.querySelectorAll(selectors[i]);
                              for(var j=0;j<els.length;j++){
                                  var el=els[j], txt=el.innerText||'';
                                  if(txt.match(/download|install|get.*app|open.*app/i) || (el.style.position==='fixed' && el.style.bottom==='0px')){
                                      el.style.display='none'; el.style.visibility='hidden';
                                      found=true;
                                  }
                              }
                          }
                          if(found){
                              hidden=true;
                              if(interval) clearInterval(interval);
                              if(observer) observer.disconnect();
                          }
                      }
                      hideBanners();
                      interval=setInterval(hideBanners,300);
                      observer=new MutationObserver(hideBanners);
                      observer.observe(document.documentElement,{childList:true,subtree:true});
                  })();
                  """
                  let bannerScript = WKUserScript(source: bannerHiderJS, injectionTime: .atDocumentEnd, forMainFrameOnly: false)
                  config.userContentController.addUserScript(bannerScript)
                  
                  // Dynamic status bar
                  let themeJS = """
                  (function(){
                      var lastColor=null, frame=null, retries=0, maxRetries=30;
                      function rgbToHex(rgb){
                          var m=rgb.match(/rgba?\\(\\s*(\\d+)\\s*,\\s*(\\d+)\\s*,\\s*(\\d+)/i);
                          return m?m[1]+','+m[2]+','+m[3]:null;
                      }
                      function getTopColor(){
                          var headers=document.querySelectorAll('header,nav,[class*="header"],[class*="navbar"],[role="banner"],.mdc-top-app-bar');
                          for(var i=0;i<headers.length;i++){
                              var el=headers[i], rect=el.getBoundingClientRect();
                              if(rect.top<=10 && rect.height>15){
                                  var c=getComputedStyle(el).backgroundColor, hex=rgbToHex(c);
                                  if(hex && c!=='rgba(0,0,0,0)') return hex;
                              }
                          }
                          var bodyC=getComputedStyle(document.body).backgroundColor, bodyHex=rgbToHex(bodyC);
                          if(bodyHex && bodyC!=='rgba(0,0,0,0)') return bodyHex;
                          return null;
                      }
                      function sendColor(){
                          var color=getTopColor();
                          if(color && color!==lastColor){
                              lastColor=color;
                              window.webkit.messageHandlers.themeHandler.postMessage(color);
                              retries=0;
                          } else if(!color && retries<maxRetries){
                              retries++;
                              frame=requestAnimationFrame(sendColor);
                              return;
                          }
                          frame=requestAnimationFrame(sendColor);
                      }
                      sendColor();
                  })();
                  """
                  let themeScript = WKUserScript(source: themeJS, injectionTime: .atDocumentEnd, forMainFrameOnly: false)
                  config.userContentController.addUserScript(themeScript)
                  
                  webView = WKWebView(frame: .zero, configuration: config)
                  webView.translatesAutoresizingMaskIntoConstraints = false
                  webView.customUserAgent = "Mozilla/5.0 (iPhone; CPU iPhone OS 26_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/26.0 Mobile/15E148 Safari/604.1"
                  webView.navigationDelegate = self
                  webView.uiDelegate = self
                  webView.allowsBackForwardNavigationGestures = true
                  webView.isOpaque = false
                  webView.scrollView.decelerationRate = .normal
                  view.addSubview(webView)
                  
                  // FIXED: Use safeAreaLayoutGuide to prevent status bar overlap
                  NSLayoutConstraint.activate([
                      webView.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor),
                      webView.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      webView.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      webView.bottomAnchor.constraint(equalTo: view.bottomAnchor)
                  ])
                  
                  if let url = URL(string: "https://gemini.google.com") {
                      let request = URLRequest(url: url, cachePolicy: .returnCacheDataElseLoad, timeoutInterval: 30)
                      webView.load(request)
                  }
              }
              
              override func didReceiveMemoryWarning() {
                  super.didReceiveMemoryWarning()
                  webView?.evaluateJavaScript("window.LegacyTranspiler?.cache?.clear?.()")
              }
              
              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  if message.name == "themeHandler", let rgb = message.body as? String {
                      let parts = rgb.split(separator: ",").compactMap { Int($0) }
                      if parts.count == 3 {
                          let R = CGFloat(parts[0])/255, G = CGFloat(parts[1])/255, B = CGFloat(parts[2])/255
                          UIView.animate(withDuration: 0.15) {
                              self.view.backgroundColor = UIColor(red: R, green: G, blue: B, alpha: 1)
                          }
                          let luminance = (0.299*CGFloat(parts[0]) + 0.587*CGFloat(parts[1]) + 0.114*CGFloat(parts[2]))/255
                          let newStyle = luminance < 0.45
                          if newStyle != self.statusBarStyle {
                              self.statusBarStyle = newStyle
                              self.setNeedsStatusBarAppearanceUpdate()
                          }
                      }
                  }
              }
              
              func webView(_ webView: WKWebView, decidePolicyFor navigationResponse: WKNavigationResponse, decisionHandler: @escaping (WKNavigationResponsePolicy) -> Void) {
                  if let mimeType = navigationResponse.response.mimeType,
                     mimeType != "text/html" && !mimeType.hasPrefix("text/") && !mimeType.hasPrefix("application/json") {
                      decisionHandler(.download)
                  } else {
                      decisionHandler(.allow)
                  }
              }
              
              func webView(_ webView: WKWebView, navigationAction: WKNavigationAction, didBecome download: WKDownload) {
                  currentDownload = download
                  download.delegate = self
              }
              
              func webView(_ webView: WKWebView, navigationResponse: WKNavigationResponse, didBecome download: WKDownload) {
                  currentDownload = download
                  download.delegate = self
              }
              
              func download(_ download: WKDownload, decideDestinationUsing response: URLResponse, suggestedFilename: String, completionHandler: @escaping (URL?) -> Void) {
                  let docsURL = FileManager.default.urls(for: .documentDirectory, in: .userDomainMask).first!
                  let destinationURL = docsURL.appendingPathComponent(suggestedFilename)
                  currentDownloadDestinationURL = destinationURL
                  completionHandler(destinationURL)
              }
              
              func downloadDidFinish(_ download: WKDownload) {
                  currentDownload = nil
                  currentDownloadDestinationURL = nil
              }
              
              func download(_ download: WKDownload, didFailWithError error: Error, resumeData: Data?) {
                  currentDownload = nil
                  currentDownloadDestinationURL = nil
              }
              
              func webView(_ webView: WKWebView, createWebViewWith configuration: WKWebViewConfiguration, for navigationAction: WKNavigationAction, windowFeatures: WKWindowFeatures) -> WKWebView? {
                  if navigationAction.targetFrame == nil {
                      webView.load(navigationAction.request)
                  }
                  return nil
              }
              
              func webView(_ webView: WKWebView, runJavaScriptAlertPanelWithMessage message: String, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping () -> Void) {
                  let alert = UIAlertController(title: nil, message: message, preferredStyle: .alert)
                  alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler() })
                  present(alert, animated: true)
              }
              
              func webView(_ webView: WKWebView, runJavaScriptConfirmPanelWithMessage message: String, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping (Bool) -> Void) {
                  let alert = UIAlertController(title: nil, message: message, preferredStyle: .alert)
                  alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler(true) })
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel) { _ in completionHandler(false) })
                  present(alert, animated: true)
              }
              
              func webView(_ webView: WKWebView, runJavaScriptTextInputPanelWithPrompt prompt: String, defaultText: String?, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping (String?) -> Void) {
                  let alert = UIAlertController(title: nil, message: prompt, preferredStyle: .alert)
                  alert.addTextField { $0.text = defaultText }
                  alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler(alert.textFields?.first?.text) })
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel) { _ in completionHandler(nil) })
                  present(alert, animated: true)
              }
          }

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          SWIFT

      - name: Compile Swift
        run: |
          APP_NAME="Gemini"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 -framework UIKit -framework WebKit -framework AVFoundation -o Payload/${APP_NAME}.app/${APP_NAME} app.swift
          chmod +x Payload/${APP_NAME}.app/${APP_NAME}

      - name: Create Info.plist with icon configuration
        run: |
          APP_NAME="Gemini"
          cat > Payload/${APP_NAME}.app/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>Gemini</string>
              <key>CFBundleIdentifier</key><string>com.google.gemini</string>
              <key>CFBundleName</key><string>Gemini</string>
              <key>CFBundleDisplayName</key><string>Gemini</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>15.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIViewControllerBasedStatusBarAppearance</key><true/>
              <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>
              <key>NSMicrophoneUsageDescription</key><string>Gemini needs microphone for voice input</string>
              <key>NSCameraUsageDescription</key><string>Gemini needs camera for image uploads</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>Gemini needs location for AI features</string>
              <key>NSPhotoLibraryUsageDescription</key><string>Gemini needs photo library for image uploads</string>
              <key>UISupportsDocumentBrowser</key><true/>
              <key>CFBundleIcons</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>Icon-60</string>
                          <string>Icon-76</string>
                          <string>Icon-40</string>
                      </array>
                      <key>CFBundleIconName</key>
                      <string>AppIcon</string>
                  </dict>
              </dict>
              <key>CFBundleIcons~ipad</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>Icon-60</string>
                          <string>Icon-76</string>
                          <string>Icon-40</string>
                      </array>
                      <key>CFBundleIconName</key>
                      <string>AppIcon</string>
                  </dict>
              </dict>
          </dict>
          </plist>
          PLIST

      - name: Create PkgInfo
        run: |
          APP_NAME="Gemini"
          printf 'APPL????' > Payload/${APP_NAME}.app/PkgInfo

      - name: Create IPA
        run: |
          APP_NAME="Gemini"
          zip -r ${APP_NAME}.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-with-Icon
          path: Gemini.ipa
