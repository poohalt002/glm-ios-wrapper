name: Build GLM
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create app structure
        run: |
          set -ex
          mkdir -p Payload/GLM.app
          
      - name: Write theme.js (Dynamic Status Bar)
        run: |
          cat > Payload/GLM.app/theme.js <<'THEMEEOF'
          (function(){
            'use strict';
            var lastColor = '';
            var stableCount = 0;
            var sentColor = '255,255,255';
            
            function getTopColor() {
              try {
                var selectors = ['header','nav','[class*=header]','.app-header','.navbar','[class*=topbar]','[class*=app-bar]','[role=banner]','[class*=toolbar]','#header','.chat-header','.glm-header','.top-nav','.site-header'];
                for (var i = 0; i < selectors.length; i++) {
                  var el = document.querySelector(selectors[i]);
                  if (el) {
                    var rect = el.getBoundingClientRect();
                    if (rect.top <= 5 && rect.height > 20) {
                      var c = getComputedStyle(el).backgroundColor;
                      var m = c.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                      if (m && c !== 'rgba(0, 0, 0, 0)' && c !== 'transparent') {
                        return m[1] + ',' + m[2] + ',' + m[3];
                      }
                    }
                  }
                }
                var b = document.body;
                var ht = document.documentElement;
                while (b && b !== ht) {
                  var cs = getComputedStyle(b);
                  var bc = cs.backgroundColor;
                  if (bc && bc !== 'rgba(0, 0, 0, 0)' && bc !== 'transparent') {
                    var mx = bc.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                    if (mx) return mx[1] + ',' + mx[2] + ',' + mx[3];
                  }
                  b = b.parentElement;
                }
                var cv = getComputedStyle(ht).getPropertyValue('--background');
                if (cv) {
                  var mv = cv.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                  if (mv) return mv[1] + ',' + mv[2] + ',' + mv[3];
                }
                var bg = getComputedStyle(ht).backgroundColor;
                if (bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent') {
                  var mg = bg.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                  if (mg) return mg[1] + ',' + mg[2] + ',' + mg[3];
                }
              } catch (e) {}
              return '255,255,255';
            }
            
            function sendColor() {
              try {
                var c = getTopColor();
                if (c === lastColor) {
                  stableCount++;
                  if (stableCount >= 2 && c !== sentColor) {
                    sentColor = c;
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.themeHandler) {
                      window.webkit.messageHandlers.themeHandler.postMessage(c);
                    }
                  }
                } else {
                  lastColor = c;
                  stableCount = 1;
                }
              } catch (e) {}
            }
            
            sendColor();
            var intervalId = setInterval(sendColor, 400);
            
            var obs;
            try {
              obs = new MutationObserver(function(mutations) {
                var shouldSend = false;
                for (var i = 0; i < mutations.length; i++) {
                  var m = mutations[i];
                  if (m.type === 'attributes' && (m.attributeName === 'class' || m.attributeName === 'style')) {
                    shouldSend = true;
                  } else if (m.type === 'childList') {
                    shouldSend = true;
                  }
                }
                if (shouldSend) sendColor();
              });
              obs.observe(document.documentElement, { attributes: true, childList: true, subtree: true });
            } catch (e) {}
            
            function observeBody() {
              if (document.body) {
                try {
                  obs.observe(document.body, { attributes: true, childList: true, subtree: true });
                } catch (e) {}
              } else {
                setTimeout(observeBody, 100);
              }
            }
            observeBody();
            
            document.addEventListener('visibilitychange', function() {
              if (document.hidden) {
                clearInterval(intervalId);
              } else {
                intervalId = setInterval(sendColor, 400);
                sendColor();
              }
            });
          })();
          THEMEEOF

      - name: Write patches.js (Minimal ES2020+ Patches for iOS 15)
        run: |
          cat > Payload/GLM.app/patches.js <<'PATCHEOF'
          (function(){
            'use strict';
            
            // Only run on iOS 15.x
            var match = navigator.userAgent.match(/OS (\d+)_(\d+)/);
            if (!match) return;
            var major = parseInt(match[1], 10);
            if (major > 15) return;
            
            // ====== ES2021+ POLYFILLS (only if missing) ======
            
            if (!Promise.any) {
              Promise.any = function(iterable) {
                return new Promise(function(resolve, reject) {
                  var errors = [];
                  var pending = 0;
                  var first = true;
                  function check() {
                    if (!first && pending === 0) {
                      reject(new AggregateError(errors, "All promises were rejected"));
                    }
                  }
                  for (var _i = 0; _i < iterable.length; _i++) {
                    (function(item) {
                      pending++;
                      Promise.resolve(item).then(resolve, function(err) {
                        errors.push(err);
                        pending--;
                        check();
                      });
                    })(iterable[_i]);
                  }
                  first = false;
                  check();
                });
              };
            }
            
            if (!String.prototype.replaceAll) {
              String.prototype.replaceAll = function(search, replacement) {
                if (typeof search === 'string') {
                  return this.split(search).join(replacement);
                }
                return this.replace(new RegExp(search.source, search.flags.replace('g', '') + 'g'), replacement);
              };
            }
            
            if (!Array.prototype.at) {
              Array.prototype.at = function(index) {
                if (index < 0) index = this.length + index;
                return this[index];
              };
            }
            
            if (!Object.hasOwn) {
              Object.hasOwn = function(obj, prop) {
                return Object.prototype.hasOwnProperty.call(obj, prop);
              };
            }
            
            if (!Array.prototype.toSorted) {
              Array.prototype.toSorted = function(compareFn) { return this.slice().sort(compareFn); };
            }
            if (!Array.prototype.toReversed) {
              Array.prototype.toReversed = function() { return this.slice().reverse(); };
            }
            if (!Array.prototype.findLast) {
              Array.prototype.findLast = function(predicate) {
                for (var i = this.length - 1; i >= 0; i--) {
                  if (predicate(this[i], i, this)) return this[i];
                }
                return undefined;
              };
            }
            if (!Array.prototype.findLastIndex) {
              Array.prototype.findLastIndex = function(predicate) {
                for (var i = this.length - 1; i >= 0; i--) {
                  if (predicate(this[i], i, this)) return i;
                }
                return -1;
              };
            }
            
            if (!Promise.withResolvers) {
              Promise.withResolvers = function() {
                var resolve, reject;
                var promise = new Promise(function(res, rej) { resolve = res; reject = rej; });
                return { promise: promise, resolve: resolve, reject: reject };
              };
            }
            
            // ====== WEB API POLYFILLS ======
            
            if (typeof WeakRef === 'undefined') {
              window.WeakRef = function(target) { this._target = target; };
              WeakRef.prototype.deref = function() { return this._target; };
            }
            
            if (typeof FinalizationRegistry === 'undefined') {
              window.FinalizationRegistry = function() {};
              FinalizationRegistry.prototype.register = function() {};
              FinalizationRegistry.prototype.unregister = function() {};
            }
            
            if (typeof structuredClone === 'undefined') {
              window.structuredClone = function(value) { return JSON.parse(JSON.stringify(value)); };
            }
            
            if (typeof AbortSignal !== 'undefined' && !AbortSignal.timeout) {
              AbortSignal.timeout = function(ms) {
                var controller = new AbortController();
                setTimeout(function() { controller.abort(); }, ms);
                return controller.signal;
              };
            }
            
            if (typeof ResizeObserver === 'undefined') {
              window.ResizeObserver = function(callback) { this._callback = callback; };
              ResizeObserver.prototype.observe = function() {};
              ResizeObserver.prototype.unobserve = function() {};
              ResizeObserver.prototype.disconnect = function() {};
            }
            
            if (!window.requestIdleCallback) {
              window.requestIdleCallback = function(cb) {
                return setTimeout(function() {
                  cb({ didTimeout: false, timeRemaining: function() { return 50; } });
                }, 1);
              };
              window.cancelIdleCallback = function(id) { clearTimeout(id); };
            }
            
            if (!window.queueMicrotask) {
              window.queueMicrotask = function(callback) {
                Promise.resolve().then(callback).catch(function(e) {
                  setTimeout(function() { throw e; });
                });
              };
            }
            
            // ====== PATCH FETCH (remove trace headers) ======
            var _nativeFetch = window.fetch.bind(window);
            function _cleanFetch(url, opts) {
              if (opts && opts.headers) {
                try {
                  if (opts.headers instanceof Headers) {
                    opts.headers.delete('traceparent');
                    opts.headers.delete('tracestate');
                  } else if (typeof opts.headers === 'object' && !Array.isArray(opts.headers)) {
                    delete opts.headers.traceparent;
                    delete opts.headers.tracestate;
                  }
                } catch (e) {}
              }
              return _nativeFetch(url, opts);
            }
            Object.defineProperty(window, 'fetch', {
              configurable: false, enumerable: true,
              get: function() { return _cleanFetch; },
              set: function() {}
            });
            
            // ====== PATCH ANIMATE (Web Animations API) ======
            function sanitizeOptions(o) {
              if (typeof o !== 'object' || o === null) return o;
              var c = {};
              for (var k in o) { if (o.hasOwnProperty(k)) c[k] = o[k]; }
              if (typeof c.easing === 'string') c.easing = 'linear';
              delete c.composite;
              delete c.pseudoElement;
              delete c.iterationComposite;
              return c;
            }
            function noopAnimation() {
              var noop = function() {};
              var rf = function() {};
              var finished = new Promise(function(r) { rf = r; });
              var anim = {
                finished: finished, ready: finished, playState: 'finished',
                currentTime: 0, startTime: 0, playbackRate: 1, pending: false,
                replaceState: 'active', timeline: null, effect: null, id: '',
                onfinish: null, oncancel: null, onremove: null,
                play: noop, pause: noop, finish: noop, cancel: noop,
                reverse: noop, persist: noop, commitStyles: noop,
                updatePlaybackRate: noop, addEventListener: noop,
                removeEventListener: noop, dispatchEvent: function() { return false; },
                overallProgress: null
              };
              rf(anim);
              return anim;
            }
            if (typeof Element !== 'undefined') {
              var proto = Element.prototype;
              var nativeAnimate = proto.animate;
              if (typeof nativeAnimate === 'function') {
                proto.animate = function(keyframes, options2) {
                  try { return nativeAnimate.call(this, keyframes, options2); }
                  catch (e) {
                    try { return nativeAnimate.call(this, keyframes, sanitizeOptions(options2)); }
                    catch (e2) { return noopAnimation(); }
                  }
                };
              }
            }
            
            // ====== MediaQueryList polyfill ======
            (function(w) {
              function getProto() {
                if (w.MediaQueryList) return w.MediaQueryList.prototype;
                if (typeof w.matchMedia === 'function') {
                  var mql = w.matchMedia('all');
                  return Object.getPrototypeOf(mql);
                }
              }
              var proto = getProto();
              if (!proto) return;
              var wrappers = new WeakMap();
              if (!proto.addEventListener) {
                proto.addEventListener = function(type, listener) {
                  if (type !== 'change') return;
                  if (typeof listener === 'function') {
                    proto.addListener.call(this, listener);
                  } else {
                    var wrapper = wrappers.get(listener);
                    if (!wrapper) {
                      wrapper = function(ev) { listener.handleEvent(ev); };
                      wrappers.set(listener, wrapper);
                    }
                    proto.addListener.call(this, wrapper);
                  }
                };
              }
              if (!proto.removeEventListener) {
                proto.removeEventListener = function(type, listener) {
                  if (type !== 'change') return;
                  if (typeof listener === 'function') {
                    proto.removeListener.call(this, listener);
                  } else {
                    var wrapper = wrappers.get(listener);
                    if (!wrapper) return;
                    proto.removeListener.call(this, wrapper);
                  }
                };
              }
            })(window);
            
            if (!console.debug) { console.debug = console.log; }
          })();
          PATCHEOF

      - name: Write Swift app code
        run: |
          cat > app.swift <<'SWIFTEOF'
          import UIKit
          import WebKit
          import AVFoundation

          class VC: UIViewController, WKScriptMessageHandler, WKUIDelegate, WKNavigationDelegate {
              var wv: WKWebView!
              var sb = false
              
              override var preferredStatusBarStyle: UIStatusBarStyle {
                  return sb ? .lightContent : .darkContent
              }
              
              override var prefersStatusBarHidden: Bool {
                  return false
              }
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = UIColor.white
                  sb = false
                  
                  AVCaptureDevice.requestAccess(for: .audio) { _ in }
                  
                  let c = WKWebViewConfiguration()
                  c.userContentController.add(self, name: "themeHandler")
                  c.allowsInlineMediaPlayback = true
                  c.mediaTypesRequiringUserActionForPlayback = []
                  c.preferences.javaScriptEnabled = true
                  c.defaultWebpagePreferences.allowsContentJavaScript = true
                  
                  // Theme JS at documentStart (needs to catch color before render)
                  if let themePath = Bundle.main.path(forResource: "theme", ofType: "js"),
                     let themeJS = try? String(contentsOfFile: themePath, encoding: .utf8) {
                      c.userContentController.addUserScript(WKUserScript(
                          source: themeJS,
                          injectionTime: .atDocumentStart,
                          forMainFrameOnly: false
                      ))
                  }
                  
                  // Patches at documentEnd (safer for SPAs - don't interfere with site loading)
                  if let patchPath = Bundle.main.path(forResource: "patches", ofType: "js"),
                     let patchJS = try? String(contentsOfFile: patchPath, encoding: .utf8) {
                      c.userContentController.addUserScript(WKUserScript(
                          source: patchJS,
                          injectionTime: .atDocumentEnd,
                          forMainFrameOnly: false
                      ))
                  }
                  
                  wv = WKWebView(frame: .zero, configuration: c)
                  wv.translatesAutoresizingMaskIntoConstraints = false
                  wv.customUserAgent = "Mozilla/5.0 (iPhone; CPU iPhone OS 26_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/26.0 Mobile/15E148 Safari/604.1"
                  wv.uiDelegate = self
                  wv.navigationDelegate = self
                  wv.allowsBackForwardNavigationGestures = true
                  wv.scrollView.contentInsetAdjustmentBehavior = .never
                  
                  view.addSubview(wv)
                  NSLayoutConstraint.activate([
                      wv.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor),
                      wv.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      wv.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      wv.bottomAnchor.constraint(equalTo: view.bottomAnchor)
                  ])
                  
                  if let url = URL(string: "https://chat.z.ai") {
                      var request = URLRequest(url: url)
                      request.setValue("Mozilla/5.0 (iPhone; CPU iPhone OS 26_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/26.0 Mobile/15E148 Safari/604.1", forHTTPHeaderField: "User-Agent")
                      wv.load(request)
                  }
              }
              
              func userContentController(_ u: WKUserContentController, didReceive m: WKScriptMessage) {
                  if m.name == "themeHandler" {
                      if let rgb = m.body as? String {
                          let p = rgb.split(separator: ",").compactMap { Int($0) }
                          guard p.count >= 3 else { return }
                          let R = CGFloat(p[0]) / 255.0
                          let G = CGFloat(p[1]) / 255.0
                          let B = CGFloat(p[2]) / 255.0
                          view.backgroundColor = UIColor(red: R, green: G, blue: B, alpha: 1.0)
                          let luminance = (0.299 * CGFloat(p[0]) + 0.587 * CGFloat(p[1]) + 0.114 * CGFloat(p[2])) / 255.0
                          if luminance < 0.45 { sb = true }
                          else if luminance > 0.55 { sb = false }
                          setNeedsStatusBarAppearanceUpdate()
                      }
                  }
              }
              
              func webView(_ webView: WKWebView, runJavaScriptAlertPanelWithMessage message: String, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping () -> Void) {
                  completionHandler()
              }
              
              func webView(_ webView: WKWebView, runJavaScriptConfirmPanelWithMessage message: String, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping (Bool) -> Void) {
                  completionHandler(true)
              }
              
              func webView(_ webView: WKWebView, runJavaScriptTextInputPanelWithPrompt prompt: String, defaultText: String?, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping (String?) -> Void) {
                  completionHandler(defaultText)
              }
              
              func webView(_ webView: WKWebView, decidePolicyFor navigationAction: WKNavigationAction, decisionHandler: @escaping (WKNavigationActionPolicy) -> Void) {
                  if navigationAction.targetFrame == nil {
                      webView.load(navigationAction.request)
                      decisionHandler(.cancel)
                      return
                  }
                  decisionHandler(.allow)
              }
              
              func webView(_ webView: WKWebView, createWebViewWith configuration: WKWebViewConfiguration, for navigationAction: WKNavigationAction, windowFeatures: WKWindowFeatures) -> WKWebView? {
                  if let url = navigationAction.request.url {
                      UIApplication.shared.open(url, options: [:], completionHandler: nil)
                  }
                  return nil
              }
              
              func webView(_ webView: WKWebView, didFail navigation: WKNavigation!, withError error: Error) {
                  print("Navigation failed: \\(error)")
              }
              
              func webView(_ webView: WKWebView, didFailProvisionalNavigation navigation: WKNavigation!, withError error: Error) {
                  print("Provisional navigation failed: \\(error)")
              }
          }

          class AD: UIResponder, UIApplicationDelegate {
              var w: UIWindow?
              func application(_ a: UIApplication, didFinishLaunchingWithOptions l: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  w = UIWindow(frame: UIScreen.main.bounds)
                  w?.rootViewController = VC()
                  w?.makeKeyAndVisible()
                  return true
              }
          }

          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AD.self))
          SWIFTEOF

      - name: Compile Swift
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 -framework UIKit -framework WebKit -framework AVFoundation -o Payload/GLM.app/GLM app.swift
          chmod +x Payload/GLM.app/GLM

      - name: Create Info.plist
        run: |
          cat > Payload/GLM.app/Info.plist <<'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>GLM</string>
            <key>CFBundleIdentifier</key><string>com.z.ai.glm</string>
            <key>CFBundleName</key><string>GLM</string>
            <key>CFBundleDisplayName</key><string>GLM</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>LSRequiresIPhoneOS</key><true/>
            <key>MinimumOSVersion</key><string>15.0</string>
            <key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UIViewControllerBasedStatusBarAppearance</key><true/>
            <key>CFBundleIcons</key>
            <dict>
              <key>CFBundlePrimaryIcon</key>
              <dict>
                <key>CFBundleIconFiles</key><array><string>AppIcon60x60</string></array>
                <key>CFBundleIconName</key><string>AppIcon</string>
              </dict>
            </dict>
            <key>NSMicrophoneUsageDescription</key><string>GLM needs microphone for voice input.</string>
            <key>NSCameraUsageDescription</key><string>GLM needs camera for image uploads.</string>
            <key>NSLocationWhenInUseUsageDescription</key><string>GLM needs location for AI features.</string>
            <key>NSPhotoLibraryUsageDescription</key><string>GLM needs photo library for image uploads.</string>
            <key>NSPhotoLibraryAddUsageDescription</key><string>GLM needs to save images to your photo library.</string>
            <key>NSFaceIDUsageDescription</key><string>GLM uses Face ID for secure authentication.</string>
            <key>UIBackgroundModes</key>
            <array>
              <string>audio</string>
              <string>fetch</string>
            </array>
            <key>WKAppBoundDomains</key>
            <array>
              <string>chat.z.ai</string>
              <string>z.ai</string>
              <string>cdn.z.ai</string>
              <string>api.z.ai</string>
            </array>
          </dict>
          </plist>
          PLISTEOF

      - name: Create PkgInfo
        run: printf 'APPL????' > Payload/GLM.app/PkgInfo

      - name: Create IPA
        run: zip -r GLM.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GLM-IPA
          path: GLM.ipa
