🐛 How to Report Errors
After installing via TrollStore:
1.  Open the app and wait for the white screen (or whatever happens)
2.  Tap the red 🐛 button (top-right, draggable)
3.  Tap "📋 Copy All" to copy all logs to clipboard
4.  Paste the logs here and I'll analyze them to create the patched final app
The debug console captures:
•  [INFO] — General info, UA, WebKit version
•  [NAV] — Page load events
•  [LOG/WARN/ERROR/DEBUG] — All console output
•  [FATAL] — JS errors with stack traces
•  [NETWORK] — Every fetch/XHR request
•  [SCRIPT] — Every script being loaded
•  [LIFECYCLE] — DOM readyState changes
•  [WHITESCREEN] — Body children count, computed styles
•  [PATCH] — Polyfill injection status
