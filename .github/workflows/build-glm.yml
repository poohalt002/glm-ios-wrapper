    DebugConsoleVC.addLog("NAV", "FAIL: \(error.localizedDescription)")
}
func webView(_ webView: WKWebView, didFailProvisionalNavigation navigation: WKNavigation!, withError error: Error) {
    DebugConsoleVC.addLog("NAV", "PROVISIONAL FAIL: \(error.localizedDescription)")
}

// Message handler
func userContentController(_ ucc: WKUserContentController, didReceive message: WKScriptMessage) {
    switch message.name {
    case "themeHandler":
        if let rgb = message.body as? String {
            let p = rgb.split(separator: ",").compactMap { Int($0) }
            guard p.count >= 3 else { return }
            view.backgroundColor = UIColor(red: CGFloat(p[0])/255.0, green: CGFloat(p[1])/255.0, blue: CGFloat(p[2])/255.0, alpha: 1.0)
            let lum = (0.299*CGFloat(p[0]) + 0.587*CGFloat(p[1]) + 0.114*CGFloat(p[2])) / 255.0
            if lum < 0.45 { sb = true } else if lum > 0.55 { sb = false }
            setNeedsStatusBarAppearanceUpdate()
        }
    case "debugLog":
        if let d = message.body as? [String: Any] {
            DebugConsoleVC.addLog(d["level"] as? String ?? "LOG", d["message"] as? String ?? "", source: d["source"] as? String, line: d["line"] as? Int, column: d["column"] as? Int)
        } else if let s = message.body as? String {
            DebugConsoleVC.addLog("LOG", s)
        }
    case "debugError":
        if let d = message.body as? [String: Any] {
            DebugConsoleVC.addLog("FATAL", "JS: \(d["message"] as? String ?? "?")", source: d["filename"] as? String, line: d["lineno"] as? Int)
            if let st = d["stack"] as? String, !st.isEmpty { DebugConsoleVC.addLog("FATAL", "Stack: \(st)") }
        }
    case "debugNetwork":
        if let d = message.body as? [String: Any] {
            DebugConsoleVC.addLog("NETWORK", d["message"] as? String ?? "")
        }
    case "debugReady":
        DebugConsoleVC.addLog("INFO", "Debug JS ready")
    case "whiteScreen":
        if let d = message.body as? [String: Any] {
            DebugConsoleVC.addLog("WHITESCREEN", "Body children: \(d["children"] as? Int ?? -1)")
        }
    case "patchScript":
        if let code = message.body as? String {
            DebugConsoleVC.addLog("PATCH", "Script (\(code.count) chars)")
            wv.evaluateJavaScript(code) { _, e in if let e = e { DebugConsoleVC.addLog("PATCH", "Exec error: \(e.localizedDescription)") } }
        }
    default:
        DebugConsoleVC.addLog("WARN", "Unknown: \(message.name)")
    }
}

// JS Dialogs
func webView(_ webView: WKWebView, runJavaScriptAlertPanelWithMessage message: String, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping () -> Void) {
    DebugConsoleVC.addLog("JS-ALERT", message); completionHandler()
}
func webView(_ webView: WKWebView, runJavaScriptConfirmPanelWithMessage message: String, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping (Bool) -> Void) {
    DebugConsoleVC.addLog("JS-CONFIRM", message); completionHandler(true)
}
func webView(_ webView: WKWebView, runJavaScriptTextInputPanelWithPrompt prompt: String, defaultText: String?, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping (String?) -> Void) {
    DebugConsoleVC.addLog("JS-PROMPT", "\(prompt)"); completionHandler(defaultText)
}

