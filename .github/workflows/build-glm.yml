Here's your GLM Debug App — a complete GitHub Actions workflow that builds an ultimate debug IPA for chat.z.ai on iOS 15.8.
📋 How to Use
1.  Create a new GitHub repository (or use an existing one)
2.  Create .github/workflows/build.yml and paste the workflow below
3.  Run the workflow via Actions tab → Build GLM Debug → Run workflow
4.  Download the IPA artifact and install via TrollStore
5.  Tap the red 🐛 button to open the debug console
6.  Copy all logs and send them to me for patching
----
🔧 Complete Workflow File
Download: build_glm_debug.yml sandbox:///mnt/agents/output/build_glm_debug.yml
Or copy this into .github/workflows/build.yml:
name: Build GLM Debug
on: workflow_dispatch
jobs:
build:
runs-on: macos-latest
steps:
- uses: actions/checkout@v4
  - run: |
      set -ex
      mkdir -p Payload/GLM.app
      
      # ============================================================
      # STEP 1: Create Swift source with ALL debug features
      # Using heredoc with quotes to prevent shell expansion
      # ============================================================
      cat > app.swift << 'SWIFT_EOF'

import UIKit
import WebKit
import AVFoundation
// MARK: - Debug Console
class DebugConsoleVC: UIViewController {
var textView: UITextView!
static var sharedLogs: [String] = []
static let logQueue = DispatchQueue(label: "log.queue", qos: .utility)
override func viewDidLoad() {
    super.viewDidLoad()
    setupUI()
    refreshLogs()
}

func setupUI() {
    view.backgroundColor = UIColor.black.withAlphaComponent(0.95)
    
    let titleLabel = UILabel()
    titleLabel.text = "🔧 GLM Debug Console"
    titleLabel.textColor = .white
    titleLabel.font = UIFont.boldSystemFont(ofSize: 16)
    titleLabel.translatesAutoresizingMaskIntoConstraints = false
    view.addSubview(titleLabel)
    
    let buttonStack = UIStackView()
    buttonStack.axis = .horizontal
    buttonStack.distribution = .fillEqually
    buttonStack.spacing = 8
    buttonStack.translatesAutoresizingMaskIntoConstraints = false
    
    let copyBtn = createButton("📋 Copy All", color: .systemBlue)
    copyBtn.addTarget(self, action: #selector(copyAllLogs), for: .touchUpInside)
    
    let shareBtn = createButton("📤 Share", color: .systemGreen)
    shareBtn.addTarget(self, action: #selector(shareLogs), for: .touchUpInside)
    
    let clearBtn = createButton("🗑 Clear", color: .systemRed)
    clearBtn.addTarget(self, action: #selector(clearLogs), for: .touchUpInside)
    
    let closeBtn = createButton("❌ Close", color: .systemGray)
    closeBtn.addTarget(self, action: #selector(closeConsole), for: .touchUpInside)
    
    buttonStack.addArrangedSubview(copyBtn)
    buttonStack.addArrangedSubview(shareBtn)
    buttonStack.addArrangedSubview(clearBtn)
    buttonStack.addArrangedSubview(closeBtn)
    view.addSubview(buttonStack)
    
    textView = UITextView()
    textView.backgroundColor = UIColor(red: 0.08, green: 0.08, blue: 0.08, alpha: 1.0)
    textView.textColor = .green
    textView.font = UIFont(name: "Menlo", size: 10) ?? UIFont.monospacedSystemFont(ofSize: 10, weight: .regular)
    textView.isEditable = false
    textView.translatesAutoresizingMaskIntoConstraints = false
    textView.layer.borderColor = UIColor.darkGray.cgColor
    textView.layer.borderWidth = 1
    view.addSubview(textView)
    
    Timer.scheduledTimer(timeInterval: 0.5, target: self, selector: #selector(refreshLogs), userInfo: nil, repeats: true)
    
    NSLayoutConstraint.activate([
        titleLabel.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor, constant: 8),
        titleLabel.centerXAnchor.constraint(equalTo: view.centerXAnchor),
        buttonStack.topAnchor.constraint(equalTo: titleLabel.bottomAnchor, constant: 8),
        buttonStack.leadingAnchor.constraint(equalTo: view.leadingAnchor, constant: 8),
        buttonStack.trailingAnchor.constraint(equalTo: view.trailingAnchor, constant: -8),
        buttonStack.heightAnchor.constraint(equalToConstant: 36),
        textView.topAnchor.constraint(equalTo: buttonStack.bottomAnchor, constant: 8),
        textView.leadingAnchor.constraint(equalTo: view.leadingAnchor, constant: 4),
        textView.trailingAnchor.constraint(equalTo: view.trailingAnchor, constant: -4),
        textView.bottomAnchor.constraint(equalTo: view.safeAreaLayoutGuide.bottomAnchor, constant: -4)
    ])
}

func createButton(_ title: String, color: UIColor) -> UIButton {
    let btn = UIButton(type: .system)
    btn.setTitle(title, for: .normal)
    btn.backgroundColor = color.withAlphaComponent(0.3)
    btn.setTitleColor(.white, for: .normal)
    btn.titleLabel?.font = UIFont.systemFont(ofSize: 12, weight: .semibold)
    btn.layer.cornerRadius = 6
    btn.layer.borderWidth = 1
    btn.layer.borderColor = color.cgColor
    return btn
}

@objc func refreshLogs() {
    DebugConsoleVC.logQueue.sync {
        let logText = DebugConsoleVC.sharedLogs.joined(separator: "\n")
        DispatchQueue.main.async {
            self.textView.text = logText
            if self.textView.text.count > 0 {
                let bottom = NSMakeRange(self.textView.text.count - 1, 1)
                self.textView.scrollRangeToVisible(bottom)
            }
        }
    }
}

@objc func copyAllLogs() {
    DebugConsoleVC.logQueue.sync {
        UIPasteboard.general.string = DebugConsoleVC.sharedLogs.joined(separator: "\n")
    }
    showToast("✅ All logs copied!")
}

@objc func shareLogs() {
    DebugConsoleVC.logQueue.sync {
        let allLogs = DebugConsoleVC.sharedLogs.joined(separator: "\n")
        let activityVC = UIActivityViewController(activityItems: [allLogs], applicationActivities: nil)
        DispatchQueue.main.async { self.present(activityVC, animated: true) }
    }
}

@objc func clearLogs() {
    DebugConsoleVC.logQueue.async { DebugConsoleVC.sharedLogs.removeAll() }
    showToast("🗑 Logs cleared")
    refreshLogs()
}

@objc func closeConsole() {
    dismiss(animated: true)
}

func showToast(_ message: String) {
    let toast = UILabel()
    toast.text = message
    toast.backgroundColor = UIColor.white.withAlphaComponent(0.9)
    toast.textColor = .black
    toast.textAlignment = .center
    toast.font = UIFont.systemFont(ofSize: 14, weight: .medium)
    toast.layer.cornerRadius = 8
    toast.clipsToBounds = true
    toast.translatesAutoresizingMaskIntoConstraints = false
    view.addSubview(toast)
    NSLayoutConstraint.activate([
        toast.centerXAnchor.constraint(equalTo: view.centerXAnchor),
        toast.centerYAnchor.constraint(equalTo: view.centerYAnchor),
        toast.widthAnchor.constraint(equalToConstant: 260),
        toast.heightAnchor.constraint(equalToConstant: 44)
    ])
    UIView.animate(withDuration: 0.3, delay: 1.5, options: .curveEaseOut, animations: { toast.alpha = 0 }) { _ in toast.removeFromSuperview() }
}

static func addLog(_ level: String, _ message: String, source: String? = nil, line: Int? = nil, column: Int? = nil) {
    let df = DateFormatter()
    df.dateFormat = "HH:mm:ss.SSS"
    let ts = df.string(from: Date())
    var line_str = "[\(ts)] [\(level)]"
    if let s = source { line_str += " [\(s)]" }
    if let l = line { line_str += ":\(l)" }
    if let c = column { line_str += ":\(c)" }
    line_str += " \(message)"
    logQueue.async {
        sharedLogs.append(line_str)
        if sharedLogs.count > 5000 { sharedLogs.removeFirst(sharedLogs.count - 5000) }
    }
    print(line_str)
}

}
// MARK: - Main View Controller
class VC: UIViewController, WKScriptMessageHandler, WKUIDelegate, WKNavigationDelegate {
var wv: WKWebView!
var debugButton: UIButton!
var lastColor = "255,255,255"
var stableCount = 0
var sb = false
var loadStartTime: Date?
override var preferredStatusBarStyle: UIStatusBarStyle {
    return sb ? .lightContent : .darkContent
}

override func viewDidLoad() {
    super.viewDidLoad()
    
    DebugConsoleVC.addLog("INFO", "=== GLM Debug App v1.0 Starting ===")
    DebugConsoleVC.addLog("INFO", "iOS: \(UIDevice.current.systemVersion)")
    DebugConsoleVC.addLog("INFO", "Device: \(UIDevice.current.model)")
    DebugConsoleVC.addLog("INFO", "Screen: \(UIScreen.main.bounds.size)")
    
    view.backgroundColor = UIColor.white
    sb = false
    
    AVCaptureDevice.requestAccess(for: .audio) { g in
        DebugConsoleVC.addLog("INFO", "Mic permission: \(g)")
    }
    
    let cfg = WKWebViewConfiguration()
    cfg.userContentController.add(self, name: "themeHandler")
    cfg.userContentController.add(self, name: "debugLog")
    cfg.userContentController.add(self, name: "debugError")
    cfg.userContentController.add(self, name: "debugNetwork")
    cfg.userContentController.add(self, name: "debugReady")
    cfg.userContentController.add(self, name: "patchScript")
    cfg.userContentController.add(self, name: "whiteScreen")
    cfg.allowsInlineMediaPlayback = true
    cfg.mediaTypesRequiringUserActionForPlayback = []
    cfg.preferences.javaScriptEnabled = true
    if #available(iOS 14.0, *) {
        cfg.defaultWebpagePreferences.allowsContentJavaScript = true
    }
    
    // Theme detection JS - injected at document start
    let themeJS = """
    (function(){
        var lastColor='255,255,255',stableCount=0;
        function getTopColor(){
            try{
                var s=['header','nav','[class*=header]','.app-header','.navbar','[class*=navbar]','.top-bar','.header-bar','[class*=topbar]'];
                for(var i=0;i<s.length;i++){
                    var el=document.querySelector(s[i]);
                    if(el){
                        var r=el.getBoundingClientRect();
                        if(r.top<=5&&r.height>20){
                            var c=getComputedStyle(el).backgroundColor;
                            var m=c.match(/(\\d+)[,\\s]+(\\d+)[,\\s]+(\\d+)/);
                            if(m&&c!=='rgba(0, 0, 0, 0)'&&c!=='transparent') return m[1]+','+m[2]+','+m[3];
                        }
                    }
                }
                var b=document.body;
                if(b){
                    var bc=getComputedStyle(b).backgroundColor;
                    var bm=bc.match(/(\\d+)[,\\s]+(\\d+)[,\\s]+(\\d+)/);
                    if(bm&&bm[1]!=='0') return bm[1]+','+bm[2]+','+bm[3];
                }
                var h=document.documentElement;
                if(h){
                    var hc=getComputedStyle(h).backgroundColor;
                    var hm=hc.match(/(\\d+)[,\\s]+(\\d+)[,\\s]+(\\d+)/);
                    if(hm&&hm[1]!=='0') return hm[1]+','+hm[2]+','+hm[3];
                }
            }catch(e){}
            return '255,255,255';
        }
        function sendColor(){
            var color=getTopColor();
            if(color===lastColor){stableCount++;if(stableCount>=2){window.webkit.messageHandlers.themeHandler.postMessage(color);}}
            else{lastColor=color;stableCount=0;}
        }
        sendColor();
        setInterval(sendColor,400);
        var obs=new MutationObserver(function(){sendColor();});
        var htmlObs=new MutationObserver(function(){sendColor();});
        if(document.body) obs.observe(document.body,{attributes:true,childList:true,subtree:true});
        htmlObs.observe(document.documentElement,{attributes:true});
        document.addEventListener('DOMContentLoaded',function(){
            if(document.body) obs.observe(document.body,{attributes:true,childList:true,subtree:true});
            sendColor();
        });
    })();
    """
    
    // ULTIMATE DEBUG JS - captures everything
    let debugJS = """
    (function(){
        function sendLog(level,msg,src,ln,col){
            try{window.webkit.messageHandlers.debugLog.postMessage({level:level,message:String(msg),source:src||'',line:ln||0,column:col||0});}catch(e){}
        }
        var origLog=console.log,origWarn=console.warn,origError=console.error,origInfo=console.info,origDebug=console.debug;
        console.log=function(){var a=Array.prototype.slice.call(arguments);var m=a.map(function(x){return String(x);}).join(' ');sendLog('LOG',m);origLog.apply(console,arguments);};
        console.warn=function(){var a=Array.prototype.slice.call(arguments);var m=a.map(function(x){return String(x);}).join(' ');sendLog('WARN',m);origWarn.apply(console,arguments);};
        console.error=function(){var a=Array.prototype.slice.call(arguments);var m=a.map(function(x){return String(x);}).join(' ');sendLog('ERROR',m);origError.apply(console,arguments);};
        console.info=function(){var a=Array.prototype.slice.call(arguments);var m=a.map(function(x){return String(x);}).join(' ');sendLog('INFO',m);origInfo.apply(console,arguments);};
        console.debug=function(){var a=Array.prototype.slice.call(arguments);var m=a.map(function(x){return String(x);}).join(' ');sendLog('DEBUG',m);origDebug.apply(console,arguments);};
        
        window.addEventListener('error',function(e){
            sendLog('FATAL','ERROR: '+e.message+' at '+e.filename+':'+e.lineno+':'+e.colno);
            sendLog('FATAL','Stack: '+(e.error&&e.error.stack?e.error.stack:'N/A'));
            try{window.webkit.messageHandlers.debugError.postMessage({message:e.message,filename:e.filename,lineno:e.lineno,colno:e.colno,stack:e.error&&e.error.stack?e.error.stack:''});}catch(ex){}
        });
        window.addEventListener('unhandledrejection',function(e){
            sendLog('FATAL','Unhandled Promise: '+e.reason);
            try{window.webkit.messageHandlers.debugError.postMessage({message:'Unhandled Promise: '+String(e.reason),filename:'',lineno:0,colno:0,stack:''});}catch(ex){}
        });
        
        var origFetch=window.fetch;
        window.fetch=function(url,opts){
            sendLog('NETWORK','FETCH START: '+url);
            var start=Date.now();
            return origFetch.apply(this,arguments).then(function(r){
                sendLog('NETWORK','FETCH DONE: '+url+' status='+r.status+' time='+(Date.now()-start)+'ms');
                return r;
            }).catch(function(e){
                sendLog('NETWORK','FETCH FAIL: '+url+' error='+e.message);
                throw e;
            });
        };
        
        var origXHR=window.XMLHttpRequest;
        window.XMLHttpRequest=function(){
            var xhr=new origXHR();
            var origOpen=xhr.open,url='';
            xhr.open=function(method,u){url=u;sendLog('NETWORK','XHR START: '+method+' '+u);return origOpen.apply(xhr,arguments);};
            xhr.addEventListener('load',function(){sendLog('NETWORK','XHR DONE: '+url+' status='+xhr.status);});
            xhr.addEventListener('error',function(){sendLog('NETWORK','XHR FAIL: '+url);});
            return xhr;
        };
        
        var origAppend=Element.prototype.appendChild;
        Element.prototype.appendChild=function(node){
            if(node.tagName==='SCRIPT'){sendLog('SCRIPT','Loading: '+(node.src||'(inline)'));} 
            return origAppend.apply(this,arguments);
        };
        
        document.addEventListener('readystatechange',function(){sendLog('LIFECYCLE','readyState: '+document.readyState);});
        document.addEventListener('DOMContentLoaded',function(){sendLog('LIFECYCLE','DOMContentLoaded');});
        window.addEventListener('load',function(){sendLog('LIFECYCLE','Window load');});
        
        // White screen detection
        setTimeout(function(){
            var body=document.body,html=document.documentElement;
            if(!body||!html){sendLog('WHITESCREEN','NO BODY/HTML!');}
            else{
                sendLog('WHITESCREEN','Body children: '+body.children.length);
                var cs=getComputedStyle(body);
                sendLog('WHITESCREEN','bg:'+cs.backgroundColor+' display:'+cs.display+' vis:'+cs.visibility);
                if(body.children.length===0){sendLog('WHITESCREEN','EMPTY BODY - white screen!');}
            }
            try{window.webkit.messageHandlers.whiteScreen.postMessage({children:body?body.children.length:-1});}catch(e){}
        },3000);
        setTimeout(function(){
            var body=document.body;
            if(body&&body.children.length===0){sendLog('WHITESCREEN','STILL EMPTY after 8s!');}
        },8000);
        
        sendLog('INFO','UA: '+navigator.userAgent);
        sendLog('INFO','WebKit: '+(navigator.userAgent.match(/AppleWebKit\/([0-9.]+)/)||['','?'])[1]);
        
        // iOS 15 polyfills
        if(!window.WeakRef){sendLog('PATCH','WeakRef polyfill');window.WeakRef=function(t){this._t=t;};window.WeakRef.prototype.deref=function(){return this._t;};}
        if(!window.FinalizationRegistry){sendLog('PATCH','FinalizationRegistry stub');window.FinalizationRegistry=function(){};window.FinalizationRegistry.prototype.register=function(){};window.FinalizationRegistry.prototype.unregister=function(){return false;};}
        
        try{window.webkit.messageHandlers.debugReady.postMessage({ready:true});}catch(e){}
        sendLog('INFO','=== Debug ready ===');
    })();
    """
    
    cfg.userContentController.addUserScript(WKUserScript(source: themeJS, injectionTime: .atDocumentStart, forMainFrameOnly: false))
    cfg.userContentController.addUserScript(WKUserScript(source: debugJS, injectionTime: .atDocumentStart, forMainFrameOnly: false))
    
    wv = WKWebView(frame: .zero, configuration: cfg)
    wv.translatesAutoresizingMaskIntoConstraints = false
    wv.customUserAgent = "Mozilla/5.0 (iPhone; CPU iPhone OS 26_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/26.0 Mobile/15E148 Safari/604.1"
    wv.uiDelegate = self
    wv.navigationDelegate = self
    if #available(iOS 16.4, *) { wv.isInspectable = true }
    
    view.addSubview(wv)
    
    // Debug button - red floating button
    debugButton = UIButton(type: .system)
    debugButton.setTitle("🐛", for: .normal)
    debugButton.titleLabel?.font = UIFont.systemFont(ofSize: 24)
    debugButton.backgroundColor = UIColor.red.withAlphaComponent(0.85)
    debugButton.layer.cornerRadius = 25
    debugButton.layer.shadowColor = UIColor.black.cgColor
    debugButton.layer.shadowOffset = CGSize(width: 0, height: 3)
    debugButton.layer.shadowRadius = 5
    debugButton.layer.shadowOpacity = 0.6
    debugButton.translatesAutoresizingMaskIntoConstraints = false
    debugButton.addTarget(self, action: #selector(showDebugConsole), for: .touchUpInside)
    let pan = UIPanGestureRecognizer(target: self, action: #selector(dragDebugBtn(_:)))
    debugButton.addGestureRecognizer(pan)
    view.addSubview(debugButton)
    
    NSLayoutConstraint.activate([
        wv.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor),
        wv.leadingAnchor.constraint(equalTo: view.leadingAnchor),
        wv.trailingAnchor.constraint(equalTo: view.trailingAnchor),
        wv.bottomAnchor.constraint(equalTo: view.bottomAnchor),
        debugButton.widthAnchor.constraint(equalToConstant: 50),
        debugButton.heightAnchor.constraint(equalToConstant: 50),
        debugButton.trailingAnchor.constraint(equalTo: view.trailingAnchor, constant: -10),
        debugButton.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor, constant: 60)
    ])
    
    let targetURL = "https://chat.z.ai"
    DebugConsoleVC.addLog("INFO", "Loading: \(targetURL)")
    loadStartTime = Date()
    wv.load(URLRequest(url: URL(string: targetURL)!))
}

@objc func dragDebugBtn(_ gesture: UIPanGestureRecognizer) {
    let t = gesture.translation(in: view)
    if let b = gesture.view { b.center = CGPoint(x: b.center.x + t.x, y: b.center.y + t.y) }
    gesture.setTranslation(.zero, in: view)
}

@objc func showDebugConsole() {
    let d = DebugConsoleVC()
    d.modalPresentationStyle = .overFullScreen
    present(d, animated: true)
}

func injectPatches() {
    let patchJS = """
    (function(){
        console.log('[PATCH] Applying iOS 15 patches...');
        
        // MediaQueryList polyfill
        (function(w){
            var p=null;
            if(w.MediaQueryList) p=w.MediaQueryList.prototype;
            else if(typeof w.matchMedia==='function'){var m=w.matchMedia('all');p=Object.getPrototypeOf(m);}
            if(!p) return;
            var wm=new WeakMap();
            p.addEventListener=p.addEventListener||function(t,l){
                if(t!=='change') return;
                if(typeof l==='function'){p.addListener.call(this,l);}
                else{var wr=wm.get(l);if(!wr){wr=function(ev){l.handleEvent(ev);};wm.set(l,wr);}p.addListener.call(this,wr);}
            };
            p.removeEventListener=p.removeEventListener||function(t,l){
                if(t!=='change') return;
                if(typeof l==='function'){p.removeListener.call(this,l);}
                else{var wr=wm.get(l);if(!wr) return;p.removeListener.call(this,wr);}
            };
        })(window);
        
        // Element.animate sanitizer
        (function(){
            var na=Element.prototype.animate;
            if(typeof na!=='function') return;
            Element.prototype.animate=function(kf,opts){
                try{return na.call(this,kf,opts);}
                catch(e){
                    try{
                        var s={};
                        if(opts&&typeof opts==='object'){
                            for(var k in opts){
                                if(k==='easing'&&typeof opts[k]==='string') s[k]='linear';
                                else if(k!=='composite'&&k!=='pseudoElement'&&k!=='iterationComposite') s[k]=opts[k];
                            }
                        }
                        return na.call(this,kf,s);
                    }catch(e2){
                        return {finished:Promise.resolve(),ready:Promise.resolve(),playState:'finished',play:function(){},pause:function(){},finish:function(){},cancel:function(){},reverse:function(){},persist:function(){},commitStyles:function(){},updatePlaybackRate:function(){},addEventListener:function(){},removeEventListener:function(){},dispatchEvent:function(){return false;}};
                    }
                }
            };
        })();
        
        // fetch traceparent cleanup
        (function(){
            var nf=window.fetch.bind(window);
            window.fetch=function(url,opts){
                if(opts&&opts.headers){
                    if(opts.headers instanceof Headers){opts.headers.delete('traceparent');opts.headers.delete('tracestate');}
                    else if(typeof opts.headers==='object'&&!Array.isArray(opts.headers)){delete opts.headers.traceparent;delete opts.headers.tracestate;}
                }
                return nf(url,opts);
            };
        })();
        
        console.log('[PATCH] Done');
    })();
    """
    wv.evaluateJavaScript(patchJS) { _, err in
        if let e = err { DebugConsoleVC.addLog("PATCH", "Error: \(e.localizedDescription)") }
        else { DebugConsoleVC.addLog("PATCH", "Patches applied") }
    }
}

// Navigation delegate
func webView(_ webView: WKWebView, didStartProvisionalNavigation navigation: WKNavigation!) {
    DebugConsoleVC.addLog("NAV", "Load started")
}
func webView(_ webView: WKWebView, didCommit navigation: WKNavigation!) {
    DebugConsoleVC.addLog("NAV", "Committed")
}
func webView(_ webView: WKWebView, didFinish navigation: WKNavigation!) {
    let lt = loadStartTime != nil ? String(format: "%.2f", Date().timeIntervalSince(loadStartTime!)) : "?"
    DebugConsoleVC.addLog("NAV", "Loaded in \(lt)s")
    injectPatches()
}
