name: Build GLM
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -ex
          mkdir -p Payload/GLM.app

          cat > app.swift <<'SWIFT_EOF'
          import UIKit
          import WebKit
          import AVFoundation

          class VC: UIViewController, WKScriptMessageHandler, WKUIDelegate {
              var wv: WKWebView!
              var lastColor = "255,255,255"
              var stableCount = 0
              var sb = false

              override var preferredStatusBarStyle: UIStatusBarStyle {
                  return sb ? .lightContent : .darkContent
              }

              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = UIColor.white
                  sb = false
                  AVCaptureDevice.requestAccess(for: .audio) { _ in }

                  let c = WKWebViewConfiguration()
                  c.userContentController.add(self, name: "themeHandler")
                  c.allowsInlineMediaPlayback = true
                  c.mediaTypesRequiringUserActionForPlayback = []

                  // === THEME DETECTION JS (injected at document start) ===
                  let themeJS = """
                  (function(){
                    var lastSent='255,255,255',stable=0;
                    var selectors=['header','nav','[class*=header]','.app-header','.navbar',
                      '[class*=Header]','[class*=top-bar]','[class*=TopBar]',
                      '[class*=app-bar]','[class*=toolbar]','[class*=nav-bar]',
                      '[class*=NavBar]','[class*=topbar]','[class*=Topbar]'];

                    function getTopColor(){
                      try {
                        for(var i=0;i<selectors.length;i++){
                          var el=document.querySelector(selectors[i]);
                          if(el){
                            var rect=el.getBoundingClientRect();
                            if(rect.top<=5 && rect.height>20){
                              var cs=getComputedStyle(el);
                              var c=cs.backgroundColor;
                              var m=c.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                              if(m && c!=='rgba(0, 0, 0, 0)' && c!=='transparent'){
                                return m[1]+','+m[2]+','+m[3];
                              }
                              var bg=cs.getPropertyValue('--header-bg')||cs.getPropertyValue('--background')||cs.getPropertyValue('--bg');
                              if(bg){
                                var m2=bg.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                                if(m2) return m2[1]+','+m2[2]+','+m2[3];
                              }
                            }
                          }
                        }
                        var bodyBg=getComputedStyle(document.body).backgroundColor;
                        var m3=bodyBg.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                        if(m3 && bodyBg!=='rgba(0, 0, 0, 0)' && bodyBg!=='transparent') return m3[1]+','+m3[2]+','+m3[3];
                        var htmlBg=getComputedStyle(document.documentElement).backgroundColor;
                        var m4=htmlBg.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                        if(m4 && htmlBg!=='rgba(0, 0, 0, 0)' && htmlBg!=='transparent') return m4[1]+','+m4[2]+','+m4[3];
                        var all=document.querySelectorAll('*');
                        for(var j=0;j<Math.min(all.length,30);j++){
                          var r=all[j].getBoundingClientRect();
                          if(r.top<=0 && r.height>10){
                            var bc=getComputedStyle(all[j]).backgroundColor;
                            var mx=bc.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                            if(mx && bc!=='rgba(0, 0, 0, 0)' && bc!=='transparent') return mx[1]+','+mx[2]+','+mx[3];
                          }
                        }
                      } catch(e) {}
                      return '255,255,255';
                    }

                    function sendColor(){
                      try {
                        var color=getTopColor();
                        if(color===lastSent){
                          stable++;
                          if(stable>=2){
                            window.webkit.messageHandlers.themeHandler.postMessage(color);
                          }
                        } else {
                          stable=0;
                          lastSent=color;
                        }
                      } catch(e) {}
                    }

                    sendColor();
                    setInterval(sendColor,400);

                    var obs=new MutationObserver(function(){ sendColor(); });
                    obs.observe(document.documentElement,{attributes:true,childList:true,subtree:true});

                    var htmlObs=new MutationObserver(function(){ sendColor(); });
                    htmlObs.observe(document.documentElement,{attributeFilter:['class','data-theme','data-color-scheme','style']});
                  })();
                  """

                  // === COMPREHENSIVE ES2022+/2023/2024 PATCH JS ===
                  let patchJS = """
                  (function(){
                    'use strict';
                    var iosVersion='15.0';
                    try{var m=navigator.userAgent.match(/OS (\d+)[._](\d+)/);if(m)iosVersion=m[1]+'.'+m[2];}catch(e){}

                    var _moduleExports={};
                    var _importWaitlist={};
                    var _loaded=new Set();
                    var _cacheName='glm-transpiled-v2';

                    function openCache(){if(typeof caches==='undefined')return Promise.resolve(null);try{return caches.open(_cacheName);}catch(e){return Promise.resolve(null);}}
                    function resolveModule(source){if(!source.startsWith('./')&&!source.startsWith('../'))return source;var base=window.LegacyTranspiler.BASE_URL||window.location.href.replace(/\/[^\/]*$/,'');return base+'/'+source.replace(/^\.\//,'');}

                    window.LegacyTranspiler={
                      version:'2.0.0-glm',
                      init:function(opts){this._opts=opts||{};this.BASE_URL=opts.BASE_URL||'';this._target=opts.target||{platform:'iOS',version:'15.0'};},
                      exportModule:function(source,exports){_moduleExports[source]=exports;if(_importWaitlist[source]){_importWaitlist[source].forEach(function(r){r();});delete _importWaitlist[source];}},
                      importModule:function(source){source=resolveModule(source);if(_moduleExports[source])return Promise.resolve(_moduleExports[source]);var self=this;return new Promise(function(resolve){if(!_importWaitlist[source])_importWaitlist[source]=[];_importWaitlist[source].push(function(){resolve(_moduleExports[source]);});self.loadCode(source);});},
                      loadCode:function(src){if(_loaded.has(src))return;_loaded.add(src);var self=this;openCache().then(function(cache){if(cache){return cache.match(src).then(function(cached){if(cached){console.log('[GLM cache hit]',src);return cached.text().then(function(code){self._runScript(code,src);});}return self._fetchAndTranspile(src,cache);});}return self._fetchAndTranspile(src,null);});},
                      _fetchAndTranspile:function(src,cache){var self=this;console.warn('[GLM cache miss]',src);return fetch(src).then(function(r){return r.text();}).then(function(code){var patched=self.transpile(src,code);if(cache)cache.put(src,new Response(patched));self._runScript(patched,src);}).catch(function(err){console.error('[GLM transpile error]',src,err);});},
                      _runScript:function(code,src){if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.patchScript){window.webkit.messageHandlers.patchScript.postMessage(code);}else{var s=document.createElement('script');s.textContent=code;document.head.appendChild(s);}},
                      transpile:function(src,code){
                        var result=code;
                        var staticBlockCounter=0;
                        result=result.replace(/static\s*\{([^}]*)\}/g,function(m,body){var methodName='_static_block_'+(staticBlockCounter++);return'static '+methodName+'(){'+body+'}';});
                        result=result.replace(/static\s+(\w+)\s*=\s*([^;]+);/g,'static get $1(){return $2;}');
                        result=result.replace(/#(\w+)/g,'_private_$1');
                        result=result.replace(/(\w+)\s*\|\|=\s*([^;]+)/g,'$1=$1||($1=$2)');
                        result=result.replace(/(\w+)\s*\&\&=\s*([^;]+)/g,'$1=$1\&\&($1=$2)');
                        result=result.replace(/(\w+)\s*\?\?=\s*([^;]+)/g,'$1=$1==null?($1=$2):$1');
                        result=result.replace(/\.at\((-?\d+)\)/g,function(m,idx){var i=parseInt(idx);return'['+(i>=0?i:'this.length'+i)+']';});
                        result=result.replace(/Object\.hasOwn\(/g,'Object.prototype.hasOwnProperty.call(');
                        result=result.replace(/new\s+(\w+Error)\(([^,]+),\s*\{cause:/g,'new $1($2 + " cause: " + $2.cause || "")');
                        result=result.replace(/\.findLast\(/g,'.slice().reverse().find(');
                        result=result.replace(/\.findLastIndex\(/g,'.length - 1 - [].slice().reverse().findIndex(');
                        result=result.replace(/\.toSorted\(/g,'.slice().sort(');
                        result=result.replace(/\.toReversed\(/g,'.slice().reverse(');
                        result=result.replace(/\.toSpliced\(/g,'.slice().splice(');
                        result=result.replace(/\.with\((\d+),\s*([^)]+)\)/g,'.slice(); var _arr = $&; _arr[$1] = $2; _arr');
                        result=result.replace(/\.isWellFormed\(\)/g,'.match(/\p{Surrogate}/u) === null');
                        result=result.replace(/\.toWellFormed\(\)/g,'.replace(/\p{Surrogate}/gu, "\uFFFD")');
                        result=result.replace(/Promise\.withResolvers\(\)/g,'(function(){var d={},p=new Promise(function(r,j){d.resolve=r;d.reject=j;});d.promise=p;return d;})()');
                        result=result.replace(/Object\.groupBy\(/g,'(function(arr,fn){var r={};arr.forEach(function(x){var k=fn(x);(r[k]=r[k]||[]).push(x);});return r;})(');
                        result=result.replace(/Map\.groupBy\(/g,'(function(arr,fn){var r=new Map();arr.forEach(function(x){var k=fn(x);if(!r.has(k))r.set(k,[]);r.get(k).push(x);});return r;})(');
                        result=result.replace(/new\s+RegExp\(([^,]+),\s*['"]([^'"]*)v([^'"]*)['"]\)/g,'new RegExp($1,"$2u$3")');
                        result=result.replace(/\/([^/]+)\/([gimsuy]*)v([gimsuy]*)/g,'/$1/$2u$3');
                        result=result.replace(/\.replaceAll\(/g,'.split().join(');
                        result=result.replace(/import\s+\{([^}]+)\}\s+from\s+['"]([^'"]+)['"];?/g,function(m,specs,path){var items=specs.split(',').map(function(s){return s.trim();});var props=items.map(function(item){var parts=item.split(/\s+as\s+/);if(parts.length===2)return parts[1]+':'+parts[0];return item+':'+item;}).join(',');return'var _mod=await window.LegacyTranspiler.importModule("'+path+'");var {'+props+'}=_mod;';});
                        result=result.replace(/import\s+\*\s+as\s+(\w+)\s+from\s+['"]([^'"]+)['"];?/g,'var $1=await window.LegacyTranspiler.importModule("$2");');
                        result=result.replace(/import\s+(\w+)\s+from\s+['"]([^'"]+)['"];?/g,'var $1=(await window.LegacyTranspiler.importModule("$2")).default||await window.LegacyTranspiler.importModule("$2");');
                        result=result.replace(/import\s+['"]([^'"]+)['"];?/g,'await window.LegacyTranspiler.importModule("$1");');
                        var exports=[];
                        result=result.replace(/export\s+default\s+(class|function)\s+(\w+)/g,function(m,type,name){exports.push({key:'default',value:name});return type+' '+name;});
                        result=result.replace(/export\s+default\s+([^;]+);?/g,function(m,expr){exports.push({key:'default',value:'__default'});return'var __default='+expr;});
                        result=result.replace(/export\s+\{([^}]+)\};?/g,function(m,specs){var items=specs.split(',').map(function(s){return s.trim();});items.forEach(function(item){var parts=item.split(/\s+as\s+/);if(parts.length===2)exports.push({key:parts[1].trim(),value:parts[0].trim()});else exports.push({key:item,value:item});});return'';});
                        result=result.replace(/export\s+(class|function|const|let|var)\s+(\w+)/g,function(m,type,name){exports.push({key:name,value:name});return type+' '+name;});
                        result=result.replace(/export\s+\*\s+from\s+['"]([^'"]+)['"];?/g,'');
                        if(exports.length>0){var props=exports.map(function(e){return e.key===e.value?e.key:e.key+':'+e.value;}).join(',');result+='\nwindow.LegacyTranspiler.exportModule("'+src+'",{'+props+'});';}
                        result=result.replace(/import\.meta\.url/g,'(document.currentScript&&document.currentScript.src||window.location.href)');
                        if(result.indexOf('await ')>-1 && result.indexOf('(async function(){')===-1){result='(async function(){\n'+result+'\n})();';}
                        result=result.replace(/(\d)_(\d)/g,'$1$2');
                        result=result.replace(/(\d+)n\b/g,'$1');
                        result=result.replace(/new\s+WeakRef\(/g,'({deref:function(){return null;}})');
                        result=result.replace(/new\s+FinalizationRegistry\(/g,'({register:function(){},unregister:function(){}})');
                        result=result.replace(/new\s+AggregateError\(/g,'new Error(');
                        result=result.replace(/Temporal\.Now\.instant\(\)/g,'new Date()');
                        result=result.replace(/Iterator\.from\(/g,'Array.from(');
                        result=result.replace(/Array\.fromAsync\(/g,'(async function(arr){var r=[];for await(var x of arr)r.push(x);return r;})(');
                        result=result.replace(/Promise\.try\(/g,'new Promise(function(r){r(');
                        result=result.replace(/new\s+Float16Array\(/g,'new Float32Array(');
                        result=result.replace(/\.toHex\(\)/g,'.reduce(function(s,b){return s+b.toString(16).padStart(2,"0");}, "")');
                        result=result.replace(/Uint8Array\.fromHex\(/g,'(function(h){var r=[];for(var i=0;i<h.length;i+=2)r.push(parseInt(h.substr(i,2),16));return new Uint8Array(r);})(');
                        result=result.replace(/RegExp\.escape\(/g,'(function(s){return s.replace(/[\^$.*+?()[\]{}|]/g, "\$&");})(');
                        result=result.replace(/Math\.sumPrecise\(/g,'(function(arr){return arr.reduce(function(a,b){return a+b;},0);})(');
                        result=result.replace(/URL\.parse\(/g,'new URL(');
                        result=result.replace(/URL\.canParse\(/g,'(function(u){try{new URL(u);return true;}catch(e){return false;}})(');
                        return "'use strict';\n"+result;
                      }
                    };

                    (function(w){var proto=w.MediaQueryList&&w.MediaQueryList.prototype;if(!proto){var mm=w.matchMedia&&w.matchMedia('all');if(mm)proto=Object.getPrototypeOf(mm);}if(!proto)return;var wrappers=new WeakMap();if(!proto.addEventListener){proto.addEventListener=function(type,listener){if(type!=='change')return;if(typeof listener==='function'){proto.addListener.call(this,listener);}else{var wrapper=wrappers.get(listener);if(!wrapper){wrapper=function(ev){listener.handleEvent(ev);};wrappers.set(listener,wrapper);}proto.addListener.call(this,wrapper);}};}if(!proto.removeEventListener){proto.removeEventListener=function(type,listener){if(type!=='change')return;if(typeof listener==='function'){proto.removeListener.call(this,listener);}else{var wrapper=wrappers.get(listener);if(wrapper)proto.removeListener.call(this,wrapper);}};}})(window);

                    (function(){var nativeFetch=window.fetch.bind(window);window.fetch=function(url,opts){opts=opts||{};if(opts.headers){if(opts.headers instanceof Headers){opts.headers.delete('traceparent');opts.headers.delete('tracestate');}else if(typeof opts.headers==='object'&&!Array.isArray(opts.headers)){delete opts.headers.traceparent;delete opts.headers.tracestate;}}return nativeFetch(url,opts);};})();

                    (function(){if(typeof window==='undefined'||typeof Element==='undefined')return;var proto=Element.prototype;var native=proto.animate;if(typeof native!=='function')return;function sanitize(opts){if(typeof opts!=='object'||opts===null)return opts;var copy={};for(var k in opts)copy[k]=opts[k];if(typeof copy.easing==='string')copy.easing='linear';delete copy.composite;delete copy.pseudoElement;delete copy.iterationComposite;return copy;}function noopAnim(){var noop=function(){};var resolveFinished=function(){};var finished=new Promise(function(r){resolveFinished=r;});var anim={finished:finished,ready:finished,playState:'finished',currentTime:0,startTime:0,playbackRate:1,pending:false,replaceState:'active',timeline:null,effect:null,id:'',onfinish:null,oncancel:null,onremove:null,play:noop,pause:noop,finish:noop,cancel:noop,reverse:noop,persist:noop,commitStyles:noop,updatePlaybackRate:noop,addEventListener:noop,removeEventListener:noop,dispatchEvent:function(){return false;},overallProgress:null};resolveFinished(anim);return anim;}proto.animate=function(keyframes,options){try{return native.call(this,keyframes,options);}catch(e){try{return native.call(this,keyframes,sanitize(options));}catch(e2){return noopAnim();}}};})();

                    if(!window.ResizeObserver){window.ResizeObserver=function(cb){this._cb=cb;this._els=[];};window.ResizeObserver.prototype.observe=function(el){this._els.push(el);};window.ResizeObserver.prototype.unobserve=function(el){var idx=this._els.indexOf(el);if(idx>-1)this._els.splice(idx,1);};window.ResizeObserver.prototype.disconnect=function(){this._els=[];};}
                    if(!window.requestIdleCallback){window.requestIdleCallback=function(cb,opts){var start=Date.now();return setTimeout(function(){cb({didTimeout:false,timeRemaining:function(){return Math.max(0,50-(Date.now()-start));}});},opts&&opts.timeout?opts.timeout:1);};window.cancelIdleCallback=function(id){clearTimeout(id);};}
                    if(!window.queueMicrotask){window.queueMicrotask=function(cb){Promise.resolve().then(cb);};}
                    if(!window.globalThis)window.globalThis=window;
                    if(!Array.prototype.flat){Array.prototype.flat=function(depth){depth=depth===undefined?1:depth;var res=[];(function flat(arr,d){arr.forEach(function(x){if(Array.isArray(x)&&d>0)flat(x,d-1);else res.push(x);});})(this,depth);return res;};}
                    if(!Array.prototype.flatMap){Array.prototype.flatMap=function(fn,thisArg){return this.map(fn,thisArg).flat(1);};}
                    if(!Object.fromEntries){Object.fromEntries=function(iterable){var obj={};for(var i=0;i<iterable.length;i++){obj[iterable[i][0]]=iterable[i][1];}return obj;};}
                    if(!Object.entries){Object.entries=function(obj){var res=[];for(var k in obj)if(obj.hasOwnProperty(k))res.push([k,obj[k]]);return res;};}
                    if(!String.prototype.matchAll){String.prototype.matchAll=function*(regex){var flags=(regex.flags||'')+'g';var re=new RegExp(regex.source,flags);var m;while((m=re.exec(this))!==null)yield m;};}
                    if(!Symbol.asyncIterator)Symbol.asyncIterator=Symbol('asyncIterator');
                    if(!window.AbortController){window.AbortController=function(){this.signal={aborted:false,addEventListener:function(){},removeEventListener:function(){}};};window.AbortController.prototype.abort=function(){this.signal.aborted=true;if(this.signal.onabort)this.signal.onabort();};}
                    if(!window.URLPattern){window.URLPattern=function(pattern){this._pattern=pattern;this.protocol='';this.username='';this.password='';this.hostname='';this.port='';this.pathname='';this.search='';this.hash='';};window.URLPattern.prototype.test=function(url){return true;};window.URLPattern.prototype.exec=function(url){return {};};}
                    if(!window.structuredClone){window.structuredClone=function(obj){return JSON.parse(JSON.stringify(obj));};}
                    if(!Array.prototype.at){Array.prototype.at=function(n){n=Math.trunc(n)||0;if(n<0)n+=this.length;if(n<0||n>=this.length)return undefined;return this[n];};}
                    if(!String.prototype.at){String.prototype.at=function(n){n=Math.trunc(n)||0;if(n<0)n+=this.length;if(n<0||n>=this.length)return undefined;return this[n];};}
                    if(!Object.hasOwn){Object.hasOwn=function(obj,prop){return Object.prototype.hasOwnProperty.call(obj,prop);};}
                    if(!Promise.any){Promise.any=function(promises){return Promise.race(promises);};}
                    if(!Promise.allSettled){Promise.allSettled=function(promises){return Promise.all(promises.map(function(p){return p.then(function(v){return{status:'fulfilled',value:v};}).catch(function(e){return{status:'rejected',reason:e};});}));};}
                    if(!Array.prototype.toSorted){Array.prototype.toSorted=function(compareFn){return this.slice().sort(compareFn);};}
                    if(!Array.prototype.toReversed){Array.prototype.toReversed=function(){return this.slice().reverse();};}
                    if(!Array.prototype.toSpliced){Array.prototype.toSpliced=function(start,deleteCount){var arr=this.slice();arr.splice.apply(arr,arguments);return arr;};}
                    if(!Array.prototype.with){Array.prototype.with=function(index,value){var arr=this.slice();arr[index]=value;return arr;};}

                    function hideBanners(){var selectors=['.download-app','[class*="download"]','[class*="Download"]','.app-banner','[class*="app-banner"]','[class*="AppBanner"]','.mobile-app','[class*="mobile-app"]','.get-app','[class*="get-the-app"]','[class*="install"]','.zai-app-banner','.glm-app-banner','[class*="app-download"]','[class*="DownloadApp"]','.app-promo','[class*="appPromo"]'];selectors.forEach(function(sel){var els=document.querySelectorAll(sel);for(var i=0;i<els.length;i++){els[i].style.display='none';els[i].style.visibility='hidden';}});}
                    hideBanners();setInterval(hideBanners,500);
                    var bannerObs=new MutationObserver(hideBanners);
                    bannerObs.observe(document.documentElement,{childList:true,subtree:true});

                    var vpMeta=document.querySelector('meta[name="viewport"]');
                    if(!vpMeta){vpMeta=document.createElement('meta');vpMeta.name='viewport';vpMeta.content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover';document.head.appendChild(vpMeta);}

                    var style=document.createElement('style');
                    style.textContent='input, textarea, select { font-size: 16px !important; }';
                    document.head.appendChild(style);

                    window.LegacyTranspiler.init({BASE_URL:window.location.origin,runScript:function(code){if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.patchScript){window.webkit.messageHandlers.patchScript.postMessage(code);}else{var s=document.createElement('script');s.textContent=code;document.head.appendChild(s);}},target:{platform:'iOS',version:iosVersion}});

                    var scriptObs=new MutationObserver(function(mutations){mutations.forEach(function(mutation){mutation.addedNodes.forEach(function(node){if(node.tagName==='SCRIPT'&&node.src){if(node.src.includes('index')||node.src.includes('chunk')||node.src.includes('vendor')||node.src.includes('main')||node.src.includes('app')||node.src.includes('bundle')){if(node.type!=='javascript/blocked'){node.type='javascript/blocked';window.LegacyTranspiler.loadCode(node.src);}}}});});});
                    scriptObs.observe(document.documentElement,{childList:true,subtree:true});

                    console.log('[GLM Wrapper] Patches loaded. iOS version:',iosVersion);
                  })();
                  """

                  c.userContentController.addUserScript(WKUserScript(source: themeJS, injectionTime: .atDocumentStart, forMainFrameOnly: false))
                  c.userContentController.addUserScript(WKUserScript(source: patchJS, injectionTime: .atDocumentStart, forMainFrameOnly: false))

                  wv = WKWebView(frame: .zero, configuration: c)
                  wv.translatesAutoresizingMaskIntoConstraints = false
                  wv.customUserAgent = "Mozilla/5.0 (iPhone; CPU iPhone OS 26_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/26.0 Mobile/15E148 Safari/604.1"
                  wv.uiDelegate = self
                  view.addSubview(wv)
                  NSLayoutConstraint.activate([
                      wv.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor),
                      wv.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      wv.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      wv.bottomAnchor.constraint(equalTo: view.bottomAnchor)
                  ])
                  wv.load(URLRequest(url: URL(string: "https://chat.z.ai/")!))
              }

              func webView(_ webView: WKWebView, runJavaScriptAlertPanelWithMessage message: String, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping () -> Void) { completionHandler() }
              func webView(_ webView: WKWebView, runJavaScriptConfirmPanelWithMessage message: String, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping (Bool) -> Void) { completionHandler(true) }
              func webView(_ webView: WKWebView, runJavaScriptTextInputPanelWithPrompt prompt: String, defaultText: String?, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping (String?) -> Void) { completionHandler(defaultText) }

              func userContentController(_ u: WKUserContentController, didReceive m: WKScriptMessage) {
                  if let rgb = m.body as? String {
                      let p = rgb.split(separator: ",").compactMap { Int($0) }
                      guard p.count == 3 else { return }
                      let R = CGFloat(p[0]) / 255.0
                      let G = CGFloat(p[1]) / 255.0
                      let B = CGFloat(p[2]) / 255.0
                      view.backgroundColor = UIColor(red: R, green: G, blue: B, alpha: 1.0)
                      let luminance = (0.299 * CGFloat(p[0]) + 0.587 * CGFloat(p[1]) + 0.114 * CGFloat(p[2])) / 255.0
                      if luminance < 0.45 { sb = true }
                      else if luminance > 0.55 { sb = false }
                      setNeedsStatusBarAppearanceUpdate()
                  }
              }
          }

          class AD: UIResponder, UIApplicationDelegate {
              var w: UIWindow?
