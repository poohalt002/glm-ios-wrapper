name: Build GLM (Fixed Verification Error)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create patch files
        run: |
          mkdir -p patches
          
          cat > patches/polyfills.js << 'POLYFILLS_EOF'
          (function(w){
            function getProto() {
              if (w.MediaQueryList) return w.MediaQueryList.prototype;
              if (typeof w.matchMedia === "function") {
                var mql = w.matchMedia("all");
                return Object.getPrototypeOf(mql);
              }
            }
            var proto = getProto();
            if (!proto) return;
            var wrappers = new WeakMap();
            proto.addEventListener = proto.addEventListener || function(type, listener) {
              if (type !== "change") return;
              if (typeof listener === "function") {
                proto.addListener.call(this, listener);
              } else {
                var wrapper = wrappers.get(listener);
                if (!wrapper) {
                  wrapper = function(ev) { listener.handleEvent(ev); };
                  wrappers.set(listener, wrapper);
                }
                proto.addListener.call(this, wrapper);
              }
            };
            proto.removeEventListener = proto.removeEventListener || function(type, listener) {
              if (type !== "change") return;
              if (typeof listener === "function") {
                proto.removeListener.call(this, listener);
              } else {
                var wrapper = wrappers.get(listener);
                if (!wrapper) return;
                proto.removeListener.call(this, wrapper);
              }
            };
          })(window);
          
          if (!window.queueMicrotask) {
            window.queueMicrotask = function(callback) { Promise.resolve().then(callback); };
          }
          
          if (!Promise.withResolvers) {
            Promise.withResolvers = function() {
              var resolve, reject;
              var promise = new Promise(function(res, rej) { resolve = res; reject = rej; });
              return { promise: promise, resolve: resolve, reject: reject };
            };
          }
          
          if (!Array.prototype.at) {
            Array.prototype.at = function(index) {
              var length = this.length;
              var relativeIndex = index >= 0 ? index : length + index;
              if (relativeIndex < 0 || relativeIndex >= length) return undefined;
              return this[relativeIndex];
            };
          }
          
          if (!String.prototype.at) {
            String.prototype.at = function(index) {
              var length = this.length;
              var relativeIndex = index >= 0 ? index : length + index;
              if (relativeIndex < 0 || relativeIndex >= length) return undefined;
              return this[relativeIndex];
            };
          }
          
          if (!Object.hasOwn) {
            Object.hasOwn = function(obj, prop) {
              return Object.prototype.hasOwnProperty.call(obj, prop);
            };
          }
          
          if (!Promise.any) {
            Promise.any = function(promises) {
              return new Promise(function(resolve, reject) {
                var errors = [];
                var pending = promises.length;
                if (pending === 0) {
                  reject(new AggregateError([], "All promises were rejected"));
                  return;
                }
                for (var i = 0; i < promises.length; i++) {
                  Promise.resolve(promises[i]).then(resolve, function(err) {
                    errors[i] = err;
                    pending--;
                    if (pending === 0) {
                      reject(new AggregateError(errors, "All promises were rejected"));
                    }
                  });
                }
              });
            };
          }
          
          if (!String.prototype.replaceAll) {
            String.prototype.replaceAll = function(search, replacement) {
              if (typeof search === "string") {
                return this.split(search).join(replacement);
              }
              if (search instanceof RegExp) {
                if (!search.global) {
                  throw new TypeError("replaceAll must be called with a global RegExp");
                }
                return this.replace(search, replacement);
              }
              return this.replace(search, replacement);
            };
          }
          
          if (typeof AggregateError === "undefined") {
            window.AggregateError = function AggregateError(errors, message) {
              var e = new Error(message);
              e.errors = errors;
              e.name = "AggregateError";
              return e;
            };
          }
          POLYFILLS_EOF
          
          cat > patches/loader.js << 'LOADER_EOF'
          (function() {
            var iosMatch = navigator.userAgent.match(/OS (\d+)_(\d+)/);
            var iosVersion = iosMatch ? iosMatch[1] + "." + iosMatch[2] : "15.0";
            
            if (typeof window.LegacyTranspiler === "undefined") {
              return;
            }
            
            window.LegacyTranspiler.init({
              BASE_URL: window.location.origin,
              runScript: function(code) {
                try {
                  var script = document.createElement("script");
                  script.textContent = code;
                  document.documentElement.appendChild(script);
                  script.remove();
                } catch(e) {}
              },
              target: { platform: "iOS", version: iosVersion },
              minify: true
            });
            
            var processedScripts = new Set();
            var observer = new MutationObserver(function(mutations) {
              for (var i = 0; i < mutations.length; i++) {
                var mutation = mutations[i];
                for (var j = 0; j < mutation.addedNodes.length; j++) {
                  var node = mutation.addedNodes[j];
                  if (node.tagName === "SCRIPT" && node.src && !processedScripts.has(node.src)) {
                    processedScripts.add(node.src);
                    node.type = "javascript/blocked";
                    window.LegacyTranspiler.loadCode(node.src);
                  }
                  if (node.tagName === "SCRIPT" && !node.src && node.textContent && node.type !== "javascript/blocked") {
                    var content = node.textContent;
                    if (/(\?\?=?|&&=?|\|\|=?|class\s+\w+\s*\{|\#\w+|\basync\b|import\s*\()/g.test(content)) {
                      node.type = "javascript/blocked";
                      try {
                        var transpiled = window.LegacyTranspiler.transpile("inline.js", content);
                        var newScript = document.createElement("script");
                        newScript.textContent = transpiled;
                        node.parentNode.replaceChild(newScript, node);
                      } catch(e) {}
                    }
                  }
                }
              }
            });
            observer.observe(document.documentElement, { childList: true, subtree: true });
          })();
          LOADER_EOF
          
          echo "Patches created"

      - name: Create app bundle
        run: |
          APP_NAME="GLM"
          mkdir -p Payload/${APP_NAME}.app
          cp patches/*.js Payload/${APP_NAME}.app/ 2>/dev/null || true

      - name: Generate Swift source (with anti‑detection and real user agent)
        run: |
          cat > app.swift << 'SWIFT'
          import UIKit
          import WebKit
          import AVFoundation

          class ViewController: UIViewController, WKScriptMessageHandler, WKUIDelegate {
              var webView: WKWebView!
              var statusBarStyle = false
              var colorUpdateTimer: Timer?

              override var preferredStatusBarStyle: UIStatusBarStyle {
                  return statusBarStyle ? .lightContent : .darkContent
              }

              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = UIColor.white
                  AVCaptureDevice.requestAccess(for: .audio) { _ in }
                  
                  let config = WKWebViewConfiguration()
                  config.userContentController.add(self, name: "themeHandler")
                  config.allowsInlineMediaPlayback = true
                  config.mediaTypesRequiringUserActionForPlayback = []
                  
                  // Load JS patches (same as GLM)
                  let bundle = Bundle.main
                  let patchFiles = ["polyfills", "loader"]
                  for file in patchFiles {
                      if let path = bundle.path(forResource: file, ofType: "js"),
                         let js = try? String(contentsOfFile: path, encoding: .utf8) {
                          let script = WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                          config.userContentController.addUserScript(script)
                      }
                  }
                  
                  if let path = bundle.path(forResource: "legacy-transpiler", ofType: "js"),
                     let js = try? String(contentsOfFile: path, encoding: .utf8) {
                      let script = WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                      config.userContentController.addUserScript(script)
                  }
                  
                  // ============================================================
                  // ANTI‑DETECTION SCRIPT (fixes "verification required" error)
                  // ============================================================
                  let antiDetectionJS = """
                  (function() {
                      // Remove webdriver flag
                      Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
                      
                      // Add plugins to look like a normal browser
                      Object.defineProperty(navigator, 'plugins', { get: () => [1, 2, 3, 4, 5] });
                      
                      // Add languages
                      Object.defineProperty(navigator, 'languages', { get: () => ['en-US', 'en'] });
                      
                      // Add missing permissions API
                      if (!navigator.permissions) {
                          navigator.permissions = { query: () => Promise.resolve({ state: 'prompt' }) };
                      }
                      
                      // Fake Chrome DevTools detection
                      window.chrome = { runtime: {} };
                      
                      console.log('[GLM] Anti‑detection active');
                  })();
                  """
                  let antiScript = WKUserScript(source: antiDetectionJS, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                  config.userContentController.addUserScript(antiScript)
                  
                  // ============================================================
                  // DYNAMIC STATUS BAR (unchanged)
                  // ============================================================
                  let themeJS = """
                  (function() {
                      var lastSentColor = null;
                      var retryCount = 0;
                      var maxRetries = 30;
                      
                      function rgbToHex(rgb) {
                          var match = rgb.match(/rgba?\\s*\\(\\s*(\\d+)\\s*,\\s*(\\d+)\\s*,\\s*(\\d+)/i);
                          if (match) {
                              return match[1] + ',' + match[2] + ',' + match[3];
                          }
                          return null;
                      }
                      
                      function getTopColor() {
                          var selectors = [
                              'header', 'nav', '.header', '.navbar', '.app-header',
                              '.top-bar', '.toolbar', '[class*="header"]', '[role="banner"]',
                              '.chat-header', '.message-header', '.main-header'
                          ];
                          
                          for (var i = 0; i < selectors.length; i++) {
                              var elements = document.querySelectorAll(selectors[i]);
                              for (var j = 0; j < elements.length; j++) {
                                  var el = elements[j];
                                  var rect = el.getBoundingClientRect();
                                  if (rect.top <= 10 && rect.height > 15) {
                                      var color = getComputedStyle(el).backgroundColor;
                                      var hex = rgbToHex(color);
                                      if (hex && color !== 'rgba(0, 0, 0, 0)' && color !== 'transparent') {
                                          return hex;
                                      }
                                  }
                              }
                          }
                          var bodyColor = getComputedStyle(document.body).backgroundColor;
                          var bodyHex = rgbToHex(bodyColor);
                          if (bodyHex && bodyColor !== 'rgba(0, 0, 0, 0)') {
                              return bodyHex;
                          }
                          return null;
                      }
                      
                      function sendColor() {
                          var color = getTopColor();
                          if (color && color !== lastSentColor) {
                              lastSentColor = color;
                              window.webkit.messageHandlers.themeHandler.postMessage(color);
                              retryCount = 0;
                          } else if (!color && retryCount < maxRetries) {
                              retryCount++;
                          }
                      }
                      
                      sendColor();
                      setInterval(sendColor, 500);
                      var observer = new MutationObserver(sendColor);
                      observer.observe(document.documentElement, {
                          attributes: true,
                          childList: true,
                          subtree: true,
                          attributeFilter: ['style', 'class']
                      });
                      if (document.body) {
                          var bodyObserver = new MutationObserver(sendColor);
                          bodyObserver.observe(document.body, { childList: true, subtree: true });
                      }
                      document.addEventListener('visibilitychange', function() {
                          if (!document.hidden) sendColor();
                      });
                  })();
                  """
                  
                  let themeScript = WKUserScript(source: themeJS, injectionTime: .atDocumentEnd, forMainFrameOnly: false)
                  config.userContentController.addUserScript(themeScript)
                  
                  webView = WKWebView(frame: .zero, configuration: config)
                  webView.translatesAutoresizingMaskIntoConstraints = false
                  // FIX: Use REAL iOS 15.8 user agent (not fake iOS 26)
                  webView.customUserAgent = "Mozilla/5.0 (iPhone; CPU iPhone OS 15_8 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1"
                  webView.uiDelegate = self
                  webView.backgroundColor = UIColor.white
                  view.addSubview(webView)
                  
                  NSLayoutConstraint.activate([
                      webView.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor),
                      webView.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      webView.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      webView.bottomAnchor.constraint(equalTo: view.bottomAnchor)
                  ])
                  
                  if let url = URL(string: "https://chat.z.ai") {
                      webView.load(URLRequest(url: url))
                  }
              }
              
              func userContentController(_ u: WKUserContentController, didReceive m: WKScriptMessage) {
                  if m.name == "themeHandler", let rgb = m.body as? String {
                      let parts = rgb.split(separator: ",").compactMap { Int($0) }
                      if parts.count == 3 {
                          let R = CGFloat(parts[0]) / 255.0
                          let G = CGFloat(parts[1]) / 255.0
                          let B = CGFloat(parts[2]) / 255.0
                          UIView.animate(withDuration: 0.2) {
                              self.view.backgroundColor = UIColor(red: R, green: G, blue: B, alpha: 1.0)
                          }
                          let luminance = (0.299 * CGFloat(parts[0]) + 0.587 * CGFloat(parts[1]) + 0.114 * CGFloat(parts[2])) / 255.0
                          let newStyle = luminance < 0.45
                          if newStyle != self.statusBarStyle {
                              self.statusBarStyle = newStyle
                              self.setNeedsStatusBarAppearanceUpdate()
                          }
                      }
                  }
              }
              
              func webView(_ w: WKWebView, runJavaScriptAlertPanelWithMessage m: String, initiatedByFrame f: WKFrameInfo, completionHandler: @escaping () -> Void) {
                  let alert = UIAlertController(title: nil, message: m, preferredStyle: .alert)
                  alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler() })
                  present(alert, animated: true)
              }
              
              func webView(_ w: WKWebView, runJavaScriptConfirmPanelWithMessage m: String, initiatedByFrame f: WKFrameInfo, completionHandler: @escaping (Bool) -> Void) {
                  let alert = UIAlertController(title: nil, message: m, preferredStyle: .alert)
                  alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler(true) })
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel) { _ in completionHandler(false) })
                  present(alert, animated: true)
              }
              
              func webView(_ w: WKWebView, runJavaScriptTextInputPanelWithPrompt p: String, defaultText: String?, initiatedByFrame f: WKFrameInfo, completionHandler: @escaping (String?) -> Void) {
                  let alert = UIAlertController(title: nil, message: p, preferredStyle: .alert)
                  alert.addTextField { $0.text = defaultText }
                  alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler(alert.textFields?.first?.text) })
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel) { _ in completionHandler(nil) })
                  present(alert, animated: true)
              }
          }

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ a: UIApplication, didFinishLaunchingWithOptions l: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          SWIFT

      - name: Compile Swift
        run: |
          APP_NAME="GLM"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 -framework UIKit -framework WebKit -framework AVFoundation -o Payload/${APP_NAME}.app/${APP_NAME} app.swift
          chmod +x Payload/${APP_NAME}.app/${APP_NAME}

      - name: Create Info.plist
        run: |
          APP_NAME="GLM"
          cat > Payload/${APP_NAME}.app/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>GLM</string>
          <key>CFBundleIdentifier</key><string>com.glm.app</string>
          <key>CFBundleName</key><string>GLM</string>
          <key>CFBundleDisplayName</key><string>GLM</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>MinimumOSVersion</key><string>15.0</string>
          <key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>
          <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>
          <key>UIViewControllerBasedStatusBarAppearance</key><true/>
          <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>
          <key>NSMicrophoneUsageDescription</key><string>GLM needs microphone for voice input</string>
          <key>NSCameraUsageDescription</key><string>GLM needs camera for image uploads</string>
          <key>NSLocationWhenInUseUsageDescription</key><string>GLM needs location for AI features</string>
          <key>NSPhotoLibraryUsageDescription</key><string>GLM needs photo library for image uploads</string>
          </dict></plist>
          PLIST

      - name: Create PkgInfo
        run: |
          APP_NAME="GLM"
          printf 'APPL????' > Payload/${APP_NAME}.app/PkgInfo

      - name: Create IPA
        run: |
          APP_NAME="GLM"
          zip -r ${APP_NAME}.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GLM-Fixed-Verification
          path: GLM.ipa
