name: Build Chat Z.AI for iOS 15.8

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug console overlay'
        type: boolean
        default: true

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # DEBUG: Show what files exist in the repo
      - name: List all files in repository
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Full file list ==="
          find . -type f -name "*.js" 2>/dev/null || echo "No JS files found"
          echo "=== Patches folder contents ==="
          ls -la patches/ 2>/dev/null || echo "patches folder not found!"

      - name: Create app structure
        run: |
          APP_NAME="ChatZAI"
          mkdir -p Payload/${APP_NAME}.app
          
          # Copy patches using multiple methods to ensure it works
          echo "=== Copying patches ==="
          
          # Method 1: Direct copy
          if [ -d "patches" ]; then
            cp -v patches/*.js Payload/${APP_NAME}.app/ 2>/dev/null || echo "No JS files in patches/"
          else
            echo "patches directory not found at root"
          fi
          
          # Method 2: Try with full path
          if [ -f "${GITHUB_WORKSPACE}/patches/legacy-transpiler.js" ]; then
            cp -v ${GITHUB_WORKSPACE}/patches/*.js Payload/${APP_NAME}.app/
          fi
          
          echo "=== Files in app bundle after copy ==="
          ls -la Payload/${APP_NAME}.app/*.js 2>/dev/null || echo "NO JS FILES IN BUNDLE!"

      - name: Generate Swift source
        run: |
          cat > app.swift << 'SWIFT'
          import UIKit
          import WebKit
          import AVFoundation

          class ViewController: UIViewController, WKScriptMessageHandler, WKUIDelegate {
              var webView: WKWebView!
              var statusBarStyle = false
              var debugMode = ${{ github.event.inputs.debug_mode == true }}

              override var preferredStatusBarStyle: UIStatusBarStyle {
                  return statusBarStyle ? .lightContent : .darkContent
              }

              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = UIColor.white
                  AVCaptureDevice.requestAccess(for: .audio) { _ in }
                  
                  let config = WKWebViewConfiguration()
                  config.userContentController.add(self, name: "themeHandler")
                  config.userContentController.add(self, name: "patchScript")
                  config.allowsInlineMediaPlayback = true
                  config.mediaTypesRequiringUserActionForPlayback = []
                  
                  let bundle = Bundle.main
                  let patchFiles = ["legacy-transpiler", "polyfills", "loader"]
                  for file in patchFiles {
                      if let path = bundle.path(forResource: file, ofType: "js"),
                         let js = try? String(contentsOfFile: path, encoding: .utf8) {
                          let script = WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                          config.userContentController.addUserScript(script)
                          print("✅ Loaded: \(file).js")
                      } else {
                          print("❌ Missing: \(file).js")
                      }
                  }
                  
                  if debugMode {
                      let debugJS = """
                      (function() {
                          var div = document.createElement('div');
                          div.id = 'ios_debug';
                          div.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:black;color:#0f0;font-family:monospace;font-size:10px;padding:4px;z-index:999999;max-height:120px;overflow-y:auto;pointer-events:none;word-break:break-all;';
                          document.body.appendChild(div);
                          window.__debugConsole = { log: function(msg) { var l = document.createElement('div'); l.textContent = new Date().toLocaleTimeString() + ' ' + msg; div.appendChild(l); div.scrollTop = div.scrollHeight; } };
                          var origLog = console.log, origError = console.error;
                          console.log = function() { origLog.apply(console, arguments); var args = Array.from(arguments).map(function(a){return typeof a==='object'?JSON.stringify(a):String(a);}).join(' '); window.__debugConsole.log('[LOG] '+args); };
                          console.error = function() { origError.apply(console, arguments); var args = Array.from(arguments).map(function(a){return typeof a==='object'?JSON.stringify(a):String(a);}).join(' '); window.__debugConsole.log('[ERROR] '+args); };
                          window.onerror = function(msg, url, line) { window.__debugConsole.log('[FATAL] '+msg+' at '+url+':'+line); return false; };
                      })();
                      """
                      let debugScript = WKUserScript(source: debugJS, injectionTime: .atDocumentEnd, forMainFrameOnly: false)
                      config.userContentController.addUserScript(debugScript)
                  }
                  
                  let themeJS = """
                  function getTopColor() {
                      var selectors = ['header','nav','[class*=header]','[class*=navbar]','[class*=toolbar]','[role=banner]'];
                      for (var i=0; i<selectors.length; i++) {
                          var el = document.querySelector(selectors[i]);
                          if (el) {
                              var rect = el.getBoundingClientRect();
                              if (rect.top <= 5 && rect.height > 20) {
                                  var c = getComputedStyle(el).backgroundColor;
                                  var m = c.match(/(\\d+)[,\\s]+(\\d+)[,\\s]+(\\d+)/);
                                  if (m && c !== 'rgba(0,0,0,0)') return m[1]+','+m[2]+','+m[3];
                              }
                          }
                      }
                      var bodyBG = getComputedStyle(document.body).backgroundColor;
                      var m = bodyBG.match(/(\\d+)[,\\s]+(\\d+)[,\\s]+(\\d+)/);
                      return m ? m[1]+','+m[2]+','+m[3] : '255,255,255';
                  }
                  function sendColor() { window.webkit.messageHandlers.themeHandler.postMessage(getTopColor()); }
                  sendColor();
                  setInterval(sendColor, 500);
                  var obs = new MutationObserver(sendColor);
                  obs.observe(document.documentElement, {attributes:true, attributeFilter:['style','class']});
                  """
                  let themeScript = WKUserScript(source: themeJS, injectionTime: .atDocumentEnd, forMainFrameOnly: false)
                  config.userContentController.addUserScript(themeScript)
                  
                  webView = WKWebView(frame: .zero, configuration: config)
                  webView.translatesAutoresizingMaskIntoConstraints = false
                  webView.customUserAgent = "Mozilla/5.0 (iPhone; CPU iPhone OS 26_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/26.0 Mobile/15E148 Safari/604.1"
                  webView.uiDelegate = self
                  if #available(iOS 16.4, *) { webView.isInspectable = debugMode }
                  view.addSubview(webView)
                  
                  NSLayoutConstraint.activate([
                      webView.topAnchor.constraint(equalTo: view.topAnchor),
                      webView.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      webView.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      webView.bottomAnchor.constraint(equalTo: view.bottomAnchor)
                  ])
                  
                  webView.load(URLRequest(url: URL(string: "https://chat.z.ai")!))
              }
              
              func userContentController(_ u: WKUserContentController, didReceive m: WKScriptMessage) {
                  if m.name == "themeHandler", let rgb = m.body as? String {
                      let parts = rgb.split(separator: ",").compactMap { Int($0) }
                      if parts.count == 3 {
                          let R = CGFloat(parts[0])/255, G = CGFloat(parts[1])/255, B = CGFloat(parts[2])/255
                          view.backgroundColor = UIColor(red: R, green: G, blue: B, alpha: 1)
                          let luma = (0.299*CGFloat(parts[0]) + 0.587*CGFloat(parts[1]) + 0.114*CGFloat(parts[2]))/255
                          let newStyle = luma < 0.45
                          if newStyle != statusBarStyle { statusBarStyle = newStyle; setNeedsStatusBarAppearanceUpdate() }
                      }
                  } else if m.name == "patchScript", let code = m.body as? String {
                      webView.evaluateJavaScript(code) { _, error in if let e = error { print("JS error: \(e)") } }
                  }
              }
              
              func webView(_ w: WKWebView, runJavaScriptAlertPanelWithMessage m: String, initiatedByFrame f: WKFrameInfo, completionHandler: @escaping () -> Void) {
                  let alert = UIAlertController(title: nil, message: m, preferredStyle: .alert)
                  alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler() })
                  present(alert, animated: true)
              }
              func webView(_ w: WKWebView, runJavaScriptConfirmPanelWithMessage m: String, initiatedByFrame f: WKFrameInfo, completionHandler: @escaping (Bool) -> Void) {
                  let alert = UIAlertController(title: nil, message: m, preferredStyle: .alert)
                  alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler(true) })
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel) { _ in completionHandler(false) })
                  present(alert, animated: true)
              }
              func webView(_ w: WKWebView, runJavaScriptTextInputPanelWithPrompt p: String, defaultText: String?, initiatedByFrame f: WKFrameInfo, completionHandler: @escaping (String?) -> Void) {
                  let alert = UIAlertController(title: nil, message: p, preferredStyle: .alert)
                  alert.addTextField { $0.text = defaultText }
                  alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler(alert.textFields?.first?.text) })
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel) { _ in completionHandler(nil) })
                  present(alert, animated: true)
              }
          }

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ a: UIApplication, didFinishLaunchingWithOptions l: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          SWIFT

      - name: Compile Swift
        run: |
          APP_NAME="ChatZAI"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 -framework UIKit -framework WebKit -framework AVFoundation -o Payload/${APP_NAME}.app/${APP_NAME} app.swift
          chmod +x Payload/${APP_NAME}.app/${APP_NAME}

      - name: Create Info.plist
        run: |
          APP_NAME="ChatZAI"
          cat > Payload/${APP_NAME}.app/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>ChatZAI</string>
          <key>CFBundleIdentifier</key><string>com.chatzai.app</string>
          <key>CFBundleName</key><string>Chat Z.AI</string>
          <key>CFBundleDisplayName</key><string>Chat Z.AI</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>MinimumOSVersion</key><string>15.0</string>
          <key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>
          <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>
          <key>UIViewControllerBasedStatusBarAppearance</key><true/>
          <key>NSMicrophoneUsageDescription</key><string>Chat Z.AI needs microphone for voice input</string>
          <key>NSCameraUsageDescription</key><string>Chat Z.AI needs camera for image uploads</string>
          <key>NSLocationWhenInUseUsageDescription</key><string>Chat Z.AI needs location for AI features</string>
          <key>NSPhotoLibraryUsageDescription</key><string>Chat Z.AI needs photo library for image uploads</string>
          </dict></plist>
          PLIST

      - name: Create PkgInfo
        run: |
          APP_NAME="ChatZAI"
          printf 'APPL????' > Payload/${APP_NAME}.app/PkgInfo

      - name: Create IPA
        run: |
          APP_NAME="ChatZAI"
          zip -r ${APP_NAME}.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ChatZAI-iOS15.8
          path: ChatZAI.ipa
