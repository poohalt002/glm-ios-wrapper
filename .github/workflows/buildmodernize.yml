name: Build Modernize Browser

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create polyfills and loader
        run: |
          mkdir -p patches
          
          cat > patches/polyfills.js << 'POLYFILLS_EOF'
          (function(w){
            if (!w.MediaQueryList || w.MediaQueryList.prototype.addEventListener) return;
            function getProto() {
              if (w.MediaQueryList) return w.MediaQueryList.prototype;
              if (typeof w.matchMedia === "function") {
                var mql = w.matchMedia("all");
                return Object.getPrototypeOf(mql);
              }
            }
            var proto = getProto();
            if (!proto) return;
            var wrappers = new WeakMap();
            proto.addEventListener = function(type, listener) {
              if (type !== "change") return;
              if (typeof listener === "function") {
                proto.addListener.call(this, listener);
              } else {
                var wrapper = wrappers.get(listener);
                if (!wrapper) {
                  wrapper = function(ev) { listener.handleEvent(ev); };
                  wrappers.set(listener, wrapper);
                }
                proto.addListener.call(this, wrapper);
              }
            };
            proto.removeEventListener = function(type, listener) {
              if (type !== "change") return;
              if (typeof listener === "function") {
                proto.removeListener.call(this, listener);
              } else {
                var wrapper = wrappers.get(listener);
                if (!wrapper) return;
                proto.removeListener.call(this, wrapper);
              }
            };
          })(window);
          
          if (!window.queueMicrotask) {
            window.queueMicrotask = function(cb) { Promise.resolve().then(cb); };
          }
          
          if (!Promise.withResolvers) {
            Promise.withResolvers = function() {
              var resolve, reject;
              var promise = new Promise(function(res, rej) { resolve = res; reject = rej; });
              return { promise: promise, resolve: resolve, reject: reject };
            };
          }
          
          if (!Array.prototype.at) {
            Array.prototype.at = function(idx) {
              var len = this.length;
              var i = idx >= 0 ? idx : len + idx;
              return (i < 0 || i >= len) ? undefined : this[i];
            };
          }
          
          if (!String.prototype.at) {
            String.prototype.at = function(idx) {
              var len = this.length;
              var i = idx >= 0 ? idx : len + idx;
              return (i < 0 || i >= len) ? undefined : this[i];
            };
          }
          
          if (!Object.hasOwn) {
            Object.hasOwn = function(obj, prop) {
              return Object.prototype.hasOwnProperty.call(obj, prop);
            };
          }
          
          if (!Promise.any) {
            Promise.any = function(promises) {
              return new Promise(function(resolve, reject) {
                var errors = [];
                var pending = promises.length;
                if (pending === 0) { reject(new AggregateError([], "All rejected")); return; }
                for (var i = 0; i < promises.length; i++) {
                  Promise.resolve(promises[i]).then(resolve, function(err) {
                    errors[i] = err;
                    if (--pending === 0) reject(new AggregateError(errors, "All rejected"));
                  });
                }
              });
            };
          }
          
          if (!String.prototype.replaceAll) {
            String.prototype.replaceAll = function(search, replacement) {
              if (typeof search === "string") return this.split(search).join(replacement);
              if (search instanceof RegExp) {
                if (!search.global) throw new TypeError("Global RegExp required");
                return this.replace(search, replacement);
              }
              return this.replace(search, replacement);
            };
          }
          
          if (typeof AggregateError === "undefined") {
            window.AggregateError = function(errors, message) {
              var e = new Error(message);
              e.errors = errors;
              e.name = "AggregateError";
              return e;
            };
          }
          POLYFILLS_EOF
          
          cat > patches/loader.js << 'LOADER_EOF'
          (function() {
            var iosMatch = navigator.userAgent.match(/OS (\d+)_(\d+)/);
            var iosVersion = iosMatch ? iosMatch[1] + "." + iosMatch[2] : "15.0";
            var cache = new Map();
            
            if (typeof window.LegacyTranspiler === "undefined") return;
            
            window.LegacyTranspiler.init({
              BASE_URL: window.location.origin,
              runScript: function(code) {
                try {
                  var script = document.createElement("script");
                  script.textContent = code;
                  (document.head || document.documentElement).appendChild(script);
                  script.remove();
                } catch(e) {}
              },
              target: { platform: "iOS", version: iosVersion },
              minify: true
            });
            
            var processedScripts = new Set();
            var observer = new MutationObserver(function(mutations) {
              for (var i = 0; i < mutations.length; i++) {
                var nodes = mutations[i].addedNodes;
                for (var j = 0; j < nodes.length; j++) {
                  var node = nodes[j];
                  if (node.tagName === "SCRIPT") {
                    if (node.src && !processedScripts.has(node.src)) {
                      processedScripts.add(node.src);
                      node.type = "javascript/blocked";
                      if (cache.has(node.src)) {
                        window.LegacyTranspiler.runScript(cache.get(node.src));
                      } else {
                        window.LegacyTranspiler.loadCode(node.src).then(function(code) {
                          if (code) cache.set(node.src, code);
                        });
                      }
                    }
                    else if (!node.src && node.textContent && node.type !== "javascript/blocked") {
                      var content = node.textContent;
                      if (content.indexOf('??') > -1 || content.indexOf('||=') > -1 || 
                          content.indexOf('&&=') > -1 || content.indexOf('#') > -1 ||
                          content.indexOf('class ') > -1) {
                        node.type = "javascript/blocked";
                        try {
                          var transpiled = window.LegacyTranspiler.transpile("inline", content);
                          var newScript = document.createElement("script");
                          newScript.textContent = transpiled;
                          node.parentNode.replaceChild(newScript, node);
                        } catch(e) {}
                      }
                    }
                  }
                }
              }
            });
            observer.observe(document.documentElement, { childList: true, subtree: true });
          })();
          LOADER_EOF
          
          echo "Patches created"

      - name: Create app bundle
        run: |
          APP_NAME="Modernize"
          mkdir -p Payload/${APP_NAME}.app
          cp patches/*.js Payload/${APP_NAME}.app/ 2>/dev/null || true
          
          # Copy icons if they exist
          for icon in Icon-60@2x.png Icon-60@3x.png Icon-76.png Icon-76@2x.png Icon-40.png Icon-40@2x.png; do
            if [ -f "$icon" ]; then
              cp "$icon" Payload/${APP_NAME}.app/
            fi
          done

      - name: Generate Swift browser source
        run: |
          cat > app.swift << 'SWIFT'
          import UIKit
          import WebKit
          import AVFoundation
          import SafariServices

          // MARK: - Models
          struct Bookmark: Codable {
              var id = UUID()
              var title: String
              var url: String
              var dateAdded: Date
          }
          
          struct HistoryEntry: Codable {
              var id = UUID()
              var title: String
              var url: String
              var date: Date
          }
          
          class Tab: NSObject {
              var id = UUID()
              var webView: WKWebView!
              var title: String = "New Tab"
              var url: URL?
              var isPrivate: Bool = false
              var isLoading: Bool = false
              var estimatedProgress: Float = 0.0
          }
          
          // MARK: - Tab Manager
          class TabManager: NSObject {
              static let shared = TabManager()
              private override init() { super.init() }
              
              var tabs: [Tab] = []
              var currentTabIndex: Int = 0
              var privateTabs: [Tab] = []
              var privateMode: Bool = false
              
              var currentTabs: [Tab] {
                  return privateMode ? privateTabs : tabs
              }
              
              var currentTab: Tab? {
                  guard currentTabIndex < currentTabs.count else { return nil }
                  return currentTabs[currentTabIndex]
              }
              
              func createNewTab(url: URL? = nil, isPrivate: Bool = false) -> Tab {
                  let tab = Tab()
                  tab.isPrivate = isPrivate
                  
                  let config = WKWebViewConfiguration()
                  if isPrivate {
                      config.websiteDataStore = WKWebsiteDataStore.nonPersistent()
                  } else {
                      config.websiteDataStore = .default()
                  }
                  config.allowsInlineMediaPlayback = true
                  config.mediaTypesRequiringUserActionForPlayback = []
                  
                  let bundle = Bundle.main
                  if let path = bundle.path(forResource: "polyfills", ofType: "js"),
                     let js = try? String(contentsOfFile: path, encoding: .utf8) {
                      let script = WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                      config.userContentController.addUserScript(script)
                  }
                  if let path = bundle.path(forResource: "loader", ofType: "js"),
                     let js = try? String(contentsOfFile: path, encoding: .utf8) {
                      let script = WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                      config.userContentController.addUserScript(script)
                  }
                  if let path = bundle.path(forResource: "legacy-transpiler", ofType: "js"),
                     let js = try? String(contentsOfFile: path, encoding: .utf8) {
                      let script = WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                      config.userContentController.addUserScript(script)
                  }
                  
                  config.userContentController.add(MessageHandler(), name: "themeHandler")
                  
                  tab.webView = WKWebView(frame: .zero, configuration: config)
                  tab.webView.allowsBackForwardNavigationGestures = true
                  
                  if let url = url {
                      tab.webView.load(URLRequest(url: url))
                      tab.url = url
                  }
                  
                  if isPrivate {
                      privateTabs.append(tab)
                  } else {
                      tabs.append(tab)
                  }
                  
                  return tab
              }
              
              func closeTab(at index: Int) {
                  let tab = currentTabs[index]
                  tab.webView.stopLoading()
                  if privateMode {
                      privateTabs.remove(at: index)
                  } else {
                      tabs.remove(at: index)
                  }
                  if currentTabs.isEmpty {
                      let _ = createNewTab(isPrivate: privateMode)
                      currentTabIndex = 0
                  } else if currentTabIndex >= currentTabs.count {
                      currentTabIndex = currentTabs.count - 1
                  }
              }
              
              func closeAllTabs() {
                  for tab in currentTabs {
                      tab.webView.stopLoading()
                  }
                  if privateMode {
                      privateTabs.removeAll()
                      let _ = createNewTab(isPrivate: true)
                      currentTabIndex = 0
                  } else {
                      tabs.removeAll()
                      let _ = createNewTab()
                      currentTabIndex = 0
                  }
              }
          }
          
          class MessageHandler: NSObject, WKScriptMessageHandler {
              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  NotificationCenter.default.post(name: NSNotification.Name("ThemeColorChanged"), object: message.body)
              }
          }
          
          // MARK: - History Manager
          class HistoryManager {
              static let shared = HistoryManager()
              private let defaults = UserDefaults.standard
              private let historyKey = "browser_history"
              
              var history: [HistoryEntry] {
                  get {
                      guard let data = defaults.data(forKey: historyKey),
                            let entries = try? JSONDecoder().decode([HistoryEntry].self, from: data) else {
                          return []
                      }
                      return entries
                  }
                  set {
                      let filtered = Array(newValue.prefix(500))
                      if let data = try? JSONEncoder().encode(filtered) {
                          defaults.set(data, forKey: historyKey)
                      }
                  }
              }
              
              func addEntry(title: String, url: String) {
                  var current = history
                  current.removeAll { $0.url == url }
                  current.insert(HistoryEntry(title: title, url: url, date: Date()), at: 0)
                  history = current
              }
              
              func clear() {
                  history = []
              }
          }
          
          // MARK: - Bookmark Manager
          class BookmarkManager {
              static let shared = BookmarkManager()
              private let defaults = UserDefaults.standard
              private let bookmarksKey = "browser_bookmarks"
              
              var bookmarks: [Bookmark] {
                  get {
                      guard let data = defaults.data(forKey: bookmarksKey),
                            let items = try? JSONDecoder().decode([Bookmark].self, from: data) else {
                          return []
                      }
                      return items
                  }
                  set {
                      if let data = try? JSONEncoder().encode(newValue) {
                          defaults.set(data, forKey: bookmarksKey)
                      }
                  }
              }
              
              func add(title: String, url: String) {
                  var current = bookmarks
                  current.removeAll { $0.url == url }
                  current.insert(Bookmark(title: title, url: url, dateAdded: Date()), at: 0)
                  bookmarks = current
              }
              
              func remove(at index: Int) {
                  var current = bookmarks
                  current.remove(at: index)
                  bookmarks = current
              }
          }
          
          // MARK: - User Agent Manager - Google Fix uses URL string
          class UserAgentManager {
              static let shared = UserAgentManager()
              private let defaults = UserDefaults.standard
              private let uaKey = "custom_user_agent"
              private let globalUAKey = "global_user_agent_mode"
              
              enum UAMode: Int, CaseIterable {
                  case ios26 = 0
                  case ios15 = 1
                  case googleFix = 2
                  case custom = 3
                  
                  var displayName: String {
                      switch self {
                      case .ios26: return "iOS 26 (Modern)"
                      case .ios15: return "iOS 15 (Default)"
                      case .googleFix: return "Google Account Fix"
                      case .custom: return "Custom"
                      }
                  }
                  
                  var userAgentString: String {
                      switch self {
                      case .ios26:
                          return "Mozilla/5.0 (iPhone; CPU iPhone OS 26_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/26.0 Mobile/15E148 Safari/604.1"
                      case .ios15:
                          return "Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1"
                      case .googleFix:
                          return "https://accounts.google.com"
                      case .custom:
                          return UserDefaults.standard.string(forKey: "custom_user_agent") ?? "Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1"
                      }
                  }
              }
              
              var currentMode: UAMode {
                  get { return UAMode(rawValue: defaults.integer(forKey: globalUAKey)) ?? .ios26 }
                  set { defaults.set(newValue.rawValue, forKey: globalUAKey) }
              }
              
              var customUA: String {
                  get { return defaults.string(forKey: uaKey) ?? "" }
                  set { defaults.set(newValue, forKey: uaKey) }
              }
              
              func userAgentForURL(_ url: URL?) -> String {
                  guard let host = url?.host?.lowercased() else { return currentMode.userAgentString }
                  if host.contains("accounts.google.com") || host.contains("google.com") {
                      return UAMode.googleFix.userAgentString
                  }
                  if currentMode == .custom {
                      return customUA.isEmpty ? UAMode.ios26.userAgentString : customUA
                  }
                  return currentMode.userAgentString
              }
          }
          
          // MARK: - Main Browser ViewController
          class BrowserViewController: UIViewController, WKNavigationDelegate, WKUIDelegate, UITextFieldDelegate, UIScrollViewDelegate {
              
              var bottomToolbar: UIView!
              var urlTextField: UITextField!
              var backButton: UIButton!
              var forwardButton: UIButton!
              var reloadButton: UIButton!
              var tabsButton: UIButton!
              var menuButton: UIButton!
              var progressView: UIProgressView!
              var webViewContainer: UIView!
              var currentWebView: WKWebView? { return TabManager.shared.currentTab?.webView }
              
              var isKeyboardVisible = false
              var bottomConstraint: NSLayoutConstraint!
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = UIColor.systemBackground
                  
                  setupUI()
                  setupKeyboardHandling()
                  setupObservers()
                  
                  if TabManager.shared.tabs.isEmpty {
                      let _ = TabManager.shared.createNewTab()
                      TabManager.shared.currentTabIndex = 0
                  }
                  switchToTab(at: 0)
                  
                  if let url = URL(string: "https://www.google.com") {
                      loadURL(url)
                  }
              }
              
              func setupUI() {
                  webViewContainer = UIView()
                  webViewContainer.translatesAutoresizingMaskIntoConstraints = false
                  view.addSubview(webViewContainer)
                  
                  progressView = UIProgressView(progressViewStyle: .bar)
                  progressView.translatesAutoresizingMaskIntoConstraints = false
                  progressView.progressTintColor = UIColor.systemBlue
                  view.addSubview(progressView)
                  
                  bottomToolbar = UIView()
                  bottomToolbar.translatesAutoresizingMaskIntoConstraints = false
                  bottomToolbar.backgroundColor = UIColor.systemBackground
                  bottomToolbar.layer.cornerRadius = 12
                  bottomToolbar.layer.maskedCorners = [.layerMinXMinYCorner, .layerMaxXMinYCorner]
                  bottomToolbar.layer.shadowColor = UIColor.black.cgColor
                  bottomToolbar.layer.shadowOffset = CGSize(width: 0, height: -2)
                  bottomToolbar.layer.shadowOpacity = 0.1
                  bottomToolbar.layer.shadowRadius = 4
                  view.addSubview(bottomToolbar)
                  
                  urlTextField = UITextField()
                  urlTextField.translatesAutoresizingMaskIntoConstraints = false
                  urlTextField.placeholder = "Search or enter URL"
                  urlTextField.borderStyle = .roundedRect
                  urlTextField.backgroundColor = UIColor.systemGray6
                  urlTextField.autocapitalizationType = .none
                  urlTextField.autocorrectionType = .no
                  urlTextField.keyboardType = .URL
                  urlTextField.returnKeyType = .go
                  urlTextField.delegate = self
                  urlTextField.clearButtonMode = .whileEditing
                  urlTextField.font = UIFont.systemFont(ofSize: 16)
                  bottomToolbar.addSubview(urlTextField)
                  
                  let buttonStack = UIStackView()
                  buttonStack.translatesAutoresizingMaskIntoConstraints = false
                  buttonStack.axis = .horizontal
                  buttonStack.distribution = .equalSpacing
                  buttonStack.alignment = .center
                  buttonStack.spacing = 20
                  bottomToolbar.addSubview(buttonStack)
                  
                  backButton = createButton(systemName: "chevron.left", action: #selector(goBack))
                  forwardButton = createButton(systemName: "chevron.right", action: #selector(goForward))
                  reloadButton = createButton(systemName: "arrow.clockwise", action: #selector(reload))
                  tabsButton = createButton(systemName: "square.on.square", action: #selector(showTabSwitcher))
                  menuButton = createButton(systemName: "ellipsis", action: #selector(showMenu))
                  
                  buttonStack.addArrangedSubview(backButton)
                  buttonStack.addArrangedSubview(forwardButton)
                  buttonStack.addArrangedSubview(reloadButton)
                  buttonStack.addArrangedSubview(tabsButton)
                  buttonStack.addArrangedSubview(menuButton)
                  
                  NSLayoutConstraint.activate([
                      webViewContainer.topAnchor.constraint(equalTo: view.topAnchor),
                      webViewContainer.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      webViewContainer.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      webViewContainer.bottomAnchor.constraint(equalTo: bottomToolbar.topAnchor),
                      
                      progressView.topAnchor.constraint(equalTo: webViewContainer.bottomAnchor),
                      progressView.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      progressView.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      progressView.heightAnchor.constraint(equalToConstant: 2),
                      
                      bottomToolbar.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      bottomToolbar.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      bottomToolbar.heightAnchor.constraint(equalToConstant: 100),
                      
                      buttonStack.leadingAnchor.constraint(equalTo: bottomToolbar.leadingAnchor, constant: 20),
                      buttonStack.trailingAnchor.constraint(equalTo: bottomToolbar.trailingAnchor, constant: -20),
                      buttonStack.topAnchor.constraint(equalTo: bottomToolbar.topAnchor, constant: 8),
                      buttonStack.heightAnchor.constraint(equalToConstant: 44),
                      
                      urlTextField.topAnchor.constraint(equalTo: buttonStack.bottomAnchor, constant: 4),
                      urlTextField.leadingAnchor.constraint(equalTo: bottomToolbar.leadingAnchor, constant: 16),
                      urlTextField.trailingAnchor.constraint(equalTo: bottomToolbar.trailingAnchor, constant: -16),
                      urlTextField.heightAnchor.constraint(equalToConstant: 40),
                      urlTextField.bottomAnchor.constraint(equalTo: bottomToolbar.bottomAnchor, constant: -8)
                  ])
                  
                  bottomConstraint = bottomToolbar.bottomAnchor.constraint(equalTo: view.safeAreaLayoutGuide.bottomAnchor)
                  bottomConstraint.isActive = true
              }
              
              func createButton(systemName: String, action: Selector) -> UIButton {
                  let button = UIButton(type: .system)
                  button.setImage(UIImage(systemName: systemName), for: .normal)
                  button.addTarget(self, action: action, for: .touchUpInside)
                  button.tintColor = UIColor.label
                  return button
              }
              
              func setupKeyboardHandling() {
                  NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow), name: UIResponder.keyboardWillShowNotification, object: nil)
                  NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification, object: nil)
                  
                  let tapGesture = UITapGestureRecognizer(target: self, action: #selector(dismissKeyboard))
                  tapGesture.cancelsTouchesInView = false
                  webViewContainer.addGestureRecognizer(tapGesture)
              }
              
              func setupObservers() {
                  NotificationCenter.default.addObserver(self, selector: #selector(themeColorChanged), name: NSNotification.Name("ThemeColorChanged"), object: nil)
                  currentWebView?.addObserver(self, forKeyPath: #keyPath(WKWebView.estimatedProgress), options: .new, context: nil)
                  currentWebView?.addObserver(self, forKeyPath: #keyPath(WKWebView.isLoading), options: .new, context: nil)
                  currentWebView?.addObserver(self, forKeyPath: #keyPath(WKWebView.url), options: .new, context: nil)
              }
              
              @objc func keyboardWillShow(_ notification: Notification) {
                  guard let keyboardFrame = notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey] as? CGRect else { return }
                  let duration = notification.userInfo?[UIResponder.keyboardAnimationDurationUserInfoKey] as? Double ?? 0.25
                  bottomConstraint.constant = -keyboardFrame.height + view.safeAreaInsets.bottom
                  UIView.animate(withDuration: duration) { self.view.layoutIfNeeded() }
                  isKeyboardVisible = true
              }
              
              @objc func keyboardWillHide(_ notification: Notification) {
                  let duration = notification.userInfo?[UIResponder.keyboardAnimationDurationUserInfoKey] as? Double ?? 0.25
                  bottomConstraint.constant = 0
                  UIView.animate(withDuration: duration) { self.view.layoutIfNeeded() }
                  isKeyboardVisible = false
              }
              
              @objc func dismissKeyboard() {
                  urlTextField.resignFirstResponder()
              }
              
              @objc func themeColorChanged(_ notification: Notification) {
                  guard let rgb = notification.object as? String else { return }
                  let parts = rgb.split(separator: ",").compactMap { Int($0) }
                  if parts.count == 3 {
                      let color = UIColor(red: CGFloat(parts[0])/255, green: CGFloat(parts[1])/255, blue: CGFloat(parts[2])/255, alpha: 1)
                      UIView.animate(withDuration: 0.2) { self.view.backgroundColor = color }
                  }
              }
              
              override func observeValue(forKeyPath keyPath: String?, of object: Any?, change: [NSKeyValueChangeKey : Any]?, context: UnsafeMutableRawPointer?) {
                  if keyPath == #keyPath(WKWebView.estimatedProgress) {
                      progressView.progress = Float(currentWebView?.estimatedProgress ?? 0)
                      progressView.isHidden = (currentWebView?.estimatedProgress ?? 0) >= 1.0
                  } else if keyPath == #keyPath(WKWebView.isLoading) {
                      let icon = (currentWebView?.isLoading == true) ? "xmark.circle" : "arrow.clockwise"
                      reloadButton.setImage(UIImage(systemName: icon), for: .normal)
                  } else if keyPath == #keyPath(WKWebView.url) {
                      updateAddressBar()
                  }
              }
              
              func switchToTab(at index: Int) {
                  currentWebView?.removeFromSuperview()
                  currentWebView?.removeObserver(self, forKeyPath: #keyPath(WKWebView.estimatedProgress))
                  currentWebView?.removeObserver(self, forKeyPath: #keyPath(WKWebView.isLoading))
                  currentWebView?.removeObserver(self, forKeyPath: #keyPath(WKWebView.url))
                  
                  TabManager.shared.currentTabIndex = index
                  if let newWebView = TabManager.shared.currentTab?.webView {
                      newWebView.translatesAutoresizingMaskIntoConstraints = false
                      newWebView.navigationDelegate = self
                      newWebView.uiDelegate = self
                      webViewContainer.addSubview(newWebView)
                      NSLayoutConstraint.activate([
                          newWebView.topAnchor.constraint(equalTo: webViewContainer.topAnchor),
                          newWebView.leadingAnchor.constraint(equalTo: webViewContainer.leadingAnchor),
                          newWebView.trailingAnchor.constraint(equalTo: webViewContainer.trailingAnchor),
                          newWebView.bottomAnchor.constraint(equalTo: webViewContainer.bottomAnchor)
                      ])
                      
                      newWebView.addObserver(self, forKeyPath: #keyPath(WKWebView.estimatedProgress), options: .new, context: nil)
                      newWebView.addObserver(self, forKeyPath: #keyPath(WKWebView.isLoading), options: .new, context: nil)
                      newWebView.addObserver(self, forKeyPath: #keyPath(WKWebView.url), options: .new, context: nil)
                      
                      updateAddressBar()
                      updateButtonStates()
                  }
              }
              
              func loadURL(_ url: URL) {
                  let ua = UserAgentManager.shared.userAgentForURL(url)
                  currentWebView?.customUserAgent = ua
                  let request = URLRequest(url: url)
                  currentWebView?.load(request)
                  updateAddressBar()
              }
              
              func loadSearch(_ query: String) {
                  let encoded = query.addingPercentEncoding(withAllowedCharacters: .urlQueryAllowed) ?? query
                  if let url = URL(string: "https://www.google.com/search?q=\(encoded)") {
                      loadURL(url)
                  }
              }
              
              @objc func goBack() {
                  currentWebView?.goBack()
              }
              
              @objc func goForward() {
                  currentWebView?.goForward()
              }
              
              @objc func reload() {
                  if currentWebView?.isLoading == true {
                      currentWebView?.stopLoading()
                  } else {
                      currentWebView?.reload()
                  }
              }
              
              @objc func showTabSwitcher() {
                  let alert = UIAlertController(title: "Tabs", message: "\(TabManager.shared.currentTabs.count) open tabs", preferredStyle: .actionSheet)
                  
                  for (index, tab) in TabManager.shared.currentTabs.enumerated() {
                      let title = tab.title.prefix(50)
                      alert.addAction(UIAlertAction(title: "\(index+1). \(title)", style: .default) { _ in
                          self.switchToTab(at: index)
                      })
                  }
                  
                  alert.addAction(UIAlertAction(title: "New Tab", style: .default) { _ in
                      let newTab = TabManager.shared.createNewTab(isPrivate: TabManager.shared.privateMode)
                      TabManager.shared.currentTabIndex = TabManager.shared.currentTabs.count - 1
                      self.switchToTab(at: TabManager.shared.currentTabIndex)
                      if let url = URL(string: "https://www.google.com") {
                          self.loadURL(url)
                      }
                  })
                  
                  alert.addAction(UIAlertAction(title: "Private Mode: \(TabManager.shared.privateMode ? "ON" : "OFF")", style: .default) { _ in
                      TabManager.shared.privateMode.toggle()
                      TabManager.shared.currentTabIndex = 0
                      if TabManager.shared.currentTabs.isEmpty {
                          let _ = TabManager.shared.createNewTab(isPrivate: TabManager.shared.privateMode)
                      }
                      self.switchToTab(at: 0)
                      self.tabsButton.setImage(UIImage(systemName: TabManager.shared.privateMode ? "lock.fill" : "square.on.square"), for: .normal)
                  })
                  
                  alert.addAction(UIAlertAction(title: "Close All Tabs", style: .destructive) { _ in
                      TabManager.shared.closeAllTabs()
                      self.switchToTab(at: 0)
                  })
                  
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel))
                  present(alert, animated: true)
              }
              
              @objc func showMenu() {
                  let alert = UIAlertController(title: nil, message: nil, preferredStyle: .actionSheet)
                  
                  // User Agent submenu
                  let uaMenu = UIAlertController(title: "User Agent", message: nil, preferredStyle: .actionSheet)
                  for mode in UserAgentManager.UAMode.allCases {
                      let isCurrent = (UserAgentManager.shared.currentMode == mode)
                      uaMenu.addAction(UIAlertAction(title: mode.displayName + (isCurrent ? " ✓" : ""), style: .default) { _ in
                          UserAgentManager.shared.currentMode = mode
                          if mode == .custom {
                              self.promptForCustomUA()
                          } else {
                              self.currentWebView?.reload()
                          }
                      })
                  }
                  uaMenu.addAction(UIAlertAction(title: "Cancel", style: .cancel))
                  
                  alert.addAction(UIAlertAction(title: "User Agent", style: .default) { _ in
                      self.present(uaMenu, animated: true)
                  })
                  
                  alert.addAction(UIAlertAction(title: "Bookmarks", style: .default) { _ in
                      self.showBookmarks()
                  })
                  
                  alert.addAction(UIAlertAction(title: "History", style: .default) { _ in
                      self.showHistory()
                  })
                  
                  alert.addAction(UIAlertAction(title: "Downloads", style: .default) { _ in
                      self.showDownloads()
                  })
                  
                  alert.addAction(UIAlertAction(title: "Add to Bookmarks", style: .default) { _ in
                      if let url = self.currentWebView?.url?.absoluteString, let title = self.currentWebView?.title {
                          BookmarkManager.shared.add(title: title, url: url)
                          let confirm = UIAlertController(title: "Bookmarked", message: title, preferredStyle: .alert)
                          confirm.addAction(UIAlertAction(title: "OK", style: .default))
                          self.present(confirm, animated: true)
                      }
                  })
                  
                  alert.addAction(UIAlertAction(title: "Share", style: .default) { _ in
                      if let url = self.currentWebView?.url {
                          let activityVC = UIActivityViewController(activityItems: [url], applicationActivities: nil)
                          self.present(activityVC, animated: true)
                      }
                  })
                  
                  alert.addAction(UIAlertAction(title: "Find in Page", style: .default) { _ in
                      self.presentFindInPage()
                  })
                  
                  alert.addAction(UIAlertAction(title: "Clear History & Data", style: .destructive) { _ in
                      HistoryManager.shared.clear()
                      WKWebsiteDataStore.default().removeData(ofTypes: WKWebsiteDataStore.allWebsiteDataTypes(), modifiedSince: Date.distantPast) {}
                      let confirm = UIAlertController(title: "Cleared", message: "History and cookies cleared", preferredStyle: .alert)
                      confirm.addAction(UIAlertAction(title: "OK", style: .default))
                      self.present(confirm, animated: true)
                  })
                  
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel))
                  present(alert, animated: true)
              }
              
