name: Build Modernize Browser IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create JS patches
        run: |
          mkdir -p patches
          
          cat > patches/polyfills.js << 'POLYFILLS_EOF'
          (function(w){
            if (!w.MediaQueryList || w.MediaQueryList.prototype.addEventListener) return;
            function getProto() {
              if (w.MediaQueryList) return w.MediaQueryList.prototype;
              if (typeof w.matchMedia === "function") {
                var mql = w.matchMedia("all");
                return Object.getPrototypeOf(mql);
              }
            }
            var proto = getProto();
            if (!proto) return;
            var wrappers = new WeakMap();
            proto.addEventListener = function(type, listener) {
              if (type !== "change") return;
              if (typeof listener === "function") {
                proto.addListener.call(this, listener);
              } else {
                var wrapper = wrappers.get(listener);
                if (!wrapper) {
                  wrapper = function(ev) { listener.handleEvent(ev); };
                  wrappers.set(listener, wrapper);
                }
                proto.addListener.call(this, wrapper);
              }
            };
            proto.removeEventListener = function(type, listener) {
              if (type !== "change") return;
              if (typeof listener === "function") {
                proto.removeListener.call(this, listener);
              } else {
                var wrapper = wrappers.get(listener);
                if (!wrapper) return;
                proto.removeListener.call(this, wrapper);
              }
            };
          })(window);
          if (!window.queueMicrotask) { window.queueMicrotask = function(cb) { Promise.resolve().then(cb); }; }
          if (!Promise.withResolvers) { Promise.withResolvers = function() { var r,j,p=new Promise(function(res,rej){r=res;j=rej;}); return {promise:p,resolve:r,reject:j}; }; }
          if (!Array.prototype.at) { Array.prototype.at = function(idx) { var len=this.length,i=idx>=0?idx:len+idx; return (i<0||i>=len)?undefined:this[i]; }; }
          if (!String.prototype.at) { String.prototype.at = function(idx) { var len=this.length,i=idx>=0?idx:len+idx; return (i<0||i>=len)?undefined:this[i]; }; }
          if (!Object.hasOwn) { Object.hasOwn = function(obj,prop) { return Object.prototype.hasOwnProperty.call(obj,prop); }; }
          if (!Promise.any) { Promise.any = function(promises) { return new Promise(function(resolve,reject){var errors=[],pending=promises.length;if(pending===0){reject(new AggregateError([],"All rejected"));return;}for(var i=0;i<promises.length;i++){Promise.resolve(promises[i]).then(resolve,function(err){errors[i]=err;if(--pending===0)reject(new AggregateError(errors,"All rejected"));});}});}; }
          if (!String.prototype.replaceAll) { String.prototype.replaceAll = function(search,replacement){if(typeof search==="string")return this.split(search).join(replacement);if(search instanceof RegExp){if(!search.global)throw new TypeError("Global RegExp required");return this.replace(search,replacement);}return this.replace(search,replacement);}; }
          if (typeof AggregateError==="undefined") { window.AggregateError=function(errors,message){var e=new Error(message);e.errors=errors;e.name="AggregateError";return e;}; }
          POLYFILLS_EOF
          
          cat > patches/loader.js << 'LOADER_EOF'
          (function() {
            var iosMatch = navigator.userAgent.match(/OS (\d+)_(\d+)/);
            var iosVersion = iosMatch ? iosMatch[1] + "." + iosMatch[2] : "15.0";
            var cache = new Map();
            if (typeof window.LegacyTranspiler === "undefined") return;
            window.LegacyTranspiler.init({ BASE_URL: window.location.origin, runScript: function(code) { try { var script = document.createElement("script"); script.textContent = code; (document.head || document.documentElement).appendChild(script); script.remove(); } catch(e) {} }, target: { platform: "iOS", version: iosVersion }, minify: true });
            var processedScripts = new Set();
            var observer = new MutationObserver(function(mutations) {
              for (var i = 0; i < mutations.length; i++) {
                var nodes = mutations[i].addedNodes;
                for (var j = 0; j < nodes.length; j++) {
                  var node = nodes[j];
                  if (node.tagName === "SCRIPT") {
                    if (node.src && !processedScripts.has(node.src)) {
                      processedScripts.add(node.src);
                      node.type = "javascript/blocked";
                      if (cache.has(node.src)) { window.LegacyTranspiler.runScript(cache.get(node.src)); }
                      else { window.LegacyTranspiler.loadCode(node.src).then(function(code) { if (code) cache.set(node.src, code); }); }
                    }
                    else if (!node.src && node.textContent && node.type !== "javascript/blocked") {
                      var content = node.textContent;
                      if (content.indexOf('??') > -1 || content.indexOf('||=') > -1 || content.indexOf('&&=') > -1 || content.indexOf('#') > -1 || content.indexOf('class ') > -1) {
                        node.type = "javascript/blocked";
                        try { var transpiled = window.LegacyTranspiler.transpile("inline", content); var newScript = document.createElement("script"); newScript.textContent = transpiled; node.parentNode.replaceChild(newScript, node); } catch(e) {}
                      }
                    }
                  }
                }
              }
            });
            observer.observe(document.documentElement, { childList: true, subtree: true });
          })();
          LOADER_EOF
          
          echo "Patches created"

      - name: Create app bundle and copy files
        run: |
          APP_NAME="Modernize"
          mkdir -p Payload/${APP_NAME}.app
          cp patches/*.js Payload/${APP_NAME}.app/ 2>/dev/null || true

      - name: Generate Swift source
        run: |
          cat > app.swift << 'SWIFT'
          import UIKit
          import WebKit

          struct Bookmark: Codable { var id = UUID(); var title: String; var url: String; var dateAdded: Date }
          struct HistoryEntry: Codable { var id = UUID(); var title: String; var url: String; var date: Date }
          
          class Tab: NSObject { var id = UUID(); var webView: WKWebView!; var title = "New Tab"; var url: URL?; var isPrivate = false }
          
          class TabManager: NSObject {
              static let shared = TabManager()
              private override init() { super.init() }
              var tabs: [Tab] = []; var currentTabIndex = 0; var privateTabs: [Tab] = []; var privateMode = false
              var currentTabs: [Tab] { return privateMode ? privateTabs : tabs }
              var currentTab: Tab? { guard currentTabIndex < currentTabs.count else { return nil }; return currentTabs[currentTabIndex] }
              
              func createNewTab(url: URL? = nil, isPrivate: Bool = false) -> Tab {
                  let tab = Tab()
                  tab.isPrivate = isPrivate
                  let config = WKWebViewConfiguration()
                  if isPrivate { config.websiteDataStore = WKWebsiteDataStore.nonPersistent() }
                  else { config.websiteDataStore = .default() }
                  config.allowsInlineMediaPlayback = true
                  config.mediaTypesRequiringUserActionForPlayback = []
                  
                  let bundle = Bundle.main
                  if let path = bundle.path(forResource: "polyfills", ofType: "js"), let js = try? String(contentsOfFile: path) {
                      config.userContentController.addUserScript(WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false))
                  }
                  if let path = bundle.path(forResource: "loader", ofType: "js"), let js = try? String(contentsOfFile: path) {
                      config.userContentController.addUserScript(WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false))
                  }
                  if let path = bundle.path(forResource: "legacy-transpiler", ofType: "js"), let js = try? String(contentsOfFile: path) {
                      config.userContentController.addUserScript(WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false))
                  }
                  
                  class Handler: NSObject, WKScriptMessageHandler {
                      func userContentController(_ u: WKUserContentController, didReceive m: WKScriptMessage) {
                          NotificationCenter.default.post(name: NSNotification.Name("ThemeColorChanged"), object: m.body)
                      }
                  }
                  config.userContentController.add(Handler(), name: "themeHandler")
                  
                  tab.webView = WKWebView(frame: .zero, configuration: config)
                  tab.webView.allowsBackForwardNavigationGestures = true
                  if let url = url { tab.webView.load(URLRequest(url: url)); tab.url = url }
                  if isPrivate { privateTabs.append(tab) } else { tabs.append(tab) }
                  return tab
              }
              
              func closeTab(at index: Int) {
                  let tab = currentTabs[index]
                  tab.webView.stopLoading()
                  if privateMode { privateTabs.remove(at: index) } else { tabs.remove(at: index) }
                  if currentTabs.isEmpty { let _ = createNewTab(isPrivate: privateMode); currentTabIndex = 0 }
                  else if currentTabIndex >= currentTabs.count { currentTabIndex = currentTabs.count - 1 }
              }
              
              func closeAllTabs() {
                  for tab in currentTabs { tab.webView.stopLoading() }
                  if privateMode { privateTabs.removeAll(); let _ = createNewTab(isPrivate: true); currentTabIndex = 0 }
                  else { tabs.removeAll(); let _ = createNewTab(); currentTabIndex = 0 }
              }
          }
          
          class HistoryManager {
              static let shared = HistoryManager()
              private let defaults = UserDefaults.standard
              private let key = "browser_history"
              var history: [HistoryEntry] {
                  get { guard let data = defaults.data(forKey: key), let entries = try? JSONDecoder().decode([HistoryEntry].self, from: data) else { return [] }; return entries }
                  set { if let data = try? JSONEncoder().encode(Array(newValue.prefix(500))) { defaults.set(data, forKey: key) } }
              }
              func addEntry(title: String, url: String) { var current = history; current.removeAll { $0.url == url }; current.insert(HistoryEntry(title: title, url: url, date: Date()), at: 0); history = current }
              func clear() { history = [] }
          }
          
          class BookmarkManager {
              static let shared = BookmarkManager()
              private let defaults = UserDefaults.standard
              private let key = "browser_bookmarks"
              var bookmarks: [Bookmark] {
                  get { guard let data = defaults.data(forKey: key), let items = try? JSONDecoder().decode([Bookmark].self, from: data) else { return [] }; return items }
                  set { if let data = try? JSONEncoder().encode(newValue) { defaults.set(data, forKey: key) } }
              }
              func add(title: String, url: String) { var current = bookmarks; current.removeAll { $0.url == url }; current.insert(Bookmark(title: title, url: url, dateAdded: Date()), at: 0); bookmarks = current }
              func remove(at index: Int) { var current = bookmarks; current.remove(at: index); bookmarks = current }
          }
          
          class UserAgentManager {
              static let shared = UserAgentManager()
              private let defaults = UserDefaults.standard
              enum UAMode: Int, CaseIterable {
                  case ios26 = 0, ios15 = 1, googleFix = 2, custom = 3
                  var displayName: String { switch self { case .ios26: return "iOS 26"; case .ios15: return "iOS 15"; case .googleFix: return "Google Fix"; case .custom: return "Custom" } }
                  var userAgentString: String {
                      switch self {
                      case .ios26: return "Mozilla/5.0 (iPhone; CPU iPhone OS 26_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/26.0 Mobile/15E148 Safari/604.1"
                      case .ios15: return "Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1"
                      case .googleFix: return "https://accounts.google.com"
                      case .custom: return UserDefaults.standard.string(forKey: "custom_ua") ?? "Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/15.0 Mobile/15E148 Safari/604.1"
                      }
                  }
              }
              var currentMode: UAMode { get { return UAMode(rawValue: defaults.integer(forKey: "ua_mode")) ?? .ios26 } set { defaults.set(newValue.rawValue, forKey: "ua_mode") } }
              var customUA: String { get { return defaults.string(forKey: "custom_ua") ?? "" } set { defaults.set(newValue, forKey: "custom_ua") } }
              func userAgentForURL(_ url: URL?) -> String {
                  guard let host = url?.host?.lowercased() else { return currentMode.userAgentString }
                  if host.contains("accounts.google.com") { return UAMode.googleFix.userAgentString }
                  if currentMode == .custom { return customUA.isEmpty ? UAMode.ios26.userAgentString : customUA }
                  return currentMode.userAgentString
              }
          }
          
          class BrowserViewController: UIViewController, WKNavigationDelegate, WKUIDelegate, UITextFieldDelegate {
              var bottomToolbar: UIView!; var urlTextField: UITextField!
              var backButton, forwardButton, reloadButton, tabsButton, menuButton: UIButton!
              var progressView: UIProgressView!; var webViewContainer: UIView!
              var bottomConstraint: NSLayoutConstraint!
              var currentWebView: WKWebView? { return TabManager.shared.currentTab?.webView }
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = UIColor.systemBackground
                  setupUI(); setupKeyboard()
                  if TabManager.shared.tabs.isEmpty { let _ = TabManager.shared.createNewTab(); TabManager.shared.currentTabIndex = 0 }
                  switchToTab(at: 0)
                  if let url = URL(string: "https://www.google.com") { loadURL(url) }
              }
              
              func setupUI() {
                  webViewContainer = UIView(); webViewContainer.translatesAutoresizingMaskIntoConstraints = false; view.addSubview(webViewContainer)
                  progressView = UIProgressView(progressViewStyle: .bar); progressView.translatesAutoresizingMaskIntoConstraints = false; progressView.progressTintColor = UIColor.systemBlue; view.addSubview(progressView)
                  bottomToolbar = UIView(); bottomToolbar.translatesAutoresizingMaskIntoConstraints = false; bottomToolbar.backgroundColor = UIColor.systemBackground; bottomToolbar.layer.cornerRadius = 12; bottomToolbar.layer.maskedCorners = [.layerMinXMinYCorner, .layerMaxXMinYCorner]; bottomToolbar.layer.shadowColor = UIColor.black.cgColor; bottomToolbar.layer.shadowOffset = CGSize(width: 0, height: -2); bottomToolbar.layer.shadowOpacity = 0.1; view.addSubview(bottomToolbar)
                  urlTextField = UITextField(); urlTextField.translatesAutoresizingMaskIntoConstraints = false; urlTextField.placeholder = "Search or enter URL"; urlTextField.borderStyle = .roundedRect; urlTextField.backgroundColor = UIColor.systemGray6; urlTextField.autocapitalizationType = .none; urlTextField.autocorrectionType = .no; urlTextField.keyboardType = .URL; urlTextField.returnKeyType = .go; urlTextField.delegate = self; urlTextField.clearButtonMode = .whileEditing; bottomToolbar.addSubview(urlTextField)
                  let stack = UIStackView(); stack.translatesAutoresizingMaskIntoConstraints = false; stack.axis = .horizontal; stack.distribution = .equalSpacing; stack.alignment = .center; stack.spacing = 20; bottomToolbar.addSubview(stack)
                  func btn(_ name: String, _ action: Selector) -> UIButton { let b = UIButton(type: .system); b.setImage(UIImage(systemName: name), for: .normal); b.addTarget(self, action: action, for: .touchUpInside); b.tintColor = UIColor.label; return b }
                  backButton = btn("chevron.left", #selector(goBack)); forwardButton = btn("chevron.right", #selector(goForward)); reloadButton = btn("arrow.clockwise", #selector(reload)); tabsButton = btn("square.on.square", #selector(showTabSwitcher)); menuButton = btn("ellipsis", #selector(showMenu))
                  [backButton, forwardButton, reloadButton, tabsButton, menuButton].forEach { stack.addArrangedSubview($0) }
                  NSLayoutConstraint.activate([
                      webViewContainer.topAnchor.constraint(equalTo: view.topAnchor), webViewContainer.leadingAnchor.constraint(equalTo: view.leadingAnchor), webViewContainer.trailingAnchor.constraint(equalTo: view.trailingAnchor), webViewContainer.bottomAnchor.constraint(equalTo: bottomToolbar.topAnchor),
                      progressView.topAnchor.constraint(equalTo: webViewContainer.bottomAnchor), progressView.leadingAnchor.constraint(equalTo: view.leadingAnchor), progressView.trailingAnchor.constraint(equalTo: view.trailingAnchor), progressView.heightAnchor.constraint(equalToConstant: 2),
                      bottomToolbar.leadingAnchor.constraint(equalTo: view.leadingAnchor), bottomToolbar.trailingAnchor.constraint(equalTo: view.trailingAnchor), bottomToolbar.heightAnchor.constraint(equalToConstant: 100),
                      stack.leadingAnchor.constraint(equalTo: bottomToolbar.leadingAnchor, constant: 20), stack.trailingAnchor.constraint(equalTo: bottomToolbar.trailingAnchor, constant: -20), stack.topAnchor.constraint(equalTo: bottomToolbar.topAnchor, constant: 8), stack.heightAnchor.constraint(equalToConstant: 44),
                      urlTextField.topAnchor.constraint(equalTo: stack.bottomAnchor, constant: 4), urlTextField.leadingAnchor.constraint(equalTo: bottomToolbar.leadingAnchor, constant: 16), urlTextField.trailingAnchor.constraint(equalTo: bottomToolbar.trailingAnchor, constant: -16), urlTextField.heightAnchor.constraint(equalToConstant: 40), urlTextField.bottomAnchor.constraint(equalTo: bottomToolbar.bottomAnchor, constant: -8)
                  ])
                  bottomConstraint = bottomToolbar.bottomAnchor.constraint(equalTo: view.safeAreaLayoutGuide.bottomAnchor); bottomConstraint.isActive = true
              }
              
              func setupKeyboard() {
                  NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow), name: UIResponder.keyboardWillShowNotification, object: nil)
                  NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification, object: nil)
                  let tap = UITapGestureRecognizer(target: self, action: #selector(dismissKeyboard)); tap.cancelsTouchesInView = false; webViewContainer.addGestureRecognizer(tap)
              }
              
              @objc func keyboardWillShow(_ n: Notification) { guard let f = n.userInfo?[UIResponder.keyboardFrameEndUserInfoKey] as? CGRect else { return }; let d = n.userInfo?[UIResponder.keyboardAnimationDurationUserInfoKey] as? Double ?? 0.25; bottomConstraint.constant = -f.height + view.safeAreaInsets.bottom; UIView.animate(withDuration: d) { self.view.layoutIfNeeded() } }
              @objc func keyboardWillHide(_ n: Notification) { let d = n.userInfo?[UIResponder.keyboardAnimationDurationUserInfoKey] as? Double ?? 0.25; bottomConstraint.constant = 0; UIView.animate(withDuration: d) { self.view.layoutIfNeeded() } }
              @objc func dismissKeyboard() { urlTextField.resignFirstResponder() }
              
              func switchToTab(at index: Int) {
                  currentWebView?.removeFromSuperview()
                  if currentWebView != nil { currentWebView?.removeObserver(self, forKeyPath: #keyPath(WKWebView.estimatedProgress)); currentWebView?.removeObserver(self, forKeyPath: #keyPath(WKWebView.isLoading)); currentWebView?.removeObserver(self, forKeyPath: #keyPath(WKWebView.url)) }
                  TabManager.shared.currentTabIndex = index
                  if let newWebView = TabManager.shared.currentTab?.webView {
                      newWebView.translatesAutoresizingMaskIntoConstraints = false; newWebView.navigationDelegate = self; newWebView.uiDelegate = self; webViewContainer.addSubview(newWebView)
                      NSLayoutConstraint.activate([newWebView.topAnchor.constraint(equalTo: webViewContainer.topAnchor), newWebView.leadingAnchor.constraint(equalTo: webViewContainer.leadingAnchor), newWebView.trailingAnchor.constraint(equalTo: webViewContainer.trailingAnchor), newWebView.bottomAnchor.constraint(equalTo: webViewContainer.bottomAnchor)])
                      newWebView.addObserver(self, forKeyPath: #keyPath(WKWebView.estimatedProgress), options: .new, context: nil)
                      newWebView.addObserver(self, forKeyPath: #keyPath(WKWebView.isLoading), options: .new, context: nil)
                      newWebView.addObserver(self, forKeyPath: #keyPath(WKWebView.url), options: .new, context: nil)
                      updateAddressBar(); updateButtons()
                  }
              }
              
              func loadURL(_ url: URL) { currentWebView?.customUserAgent = UserAgentManager.shared.userAgentForURL(url); currentWebView?.load(URLRequest(url: url)); updateAddressBar() }
              func loadSearch(_ q: String) { let e = q.addingPercentEncoding(withAllowedCharacters: .urlQueryAllowed) ?? q; if let url = URL(string: "https://www.google.com/search?q=\(e)") { loadURL(url) } }
              @objc func goBack() { currentWebView?.goBack() }
              @objc func goForward() { currentWebView?.goForward() }
              @objc func reload() { if currentWebView?.isLoading == true { currentWebView?.stopLoading() } else { currentWebView?.reload() } }
              func updateAddressBar() { if let url = currentWebView?.url, url.scheme != "about" { urlTextField.text = url.absoluteString } }
              func updateButtons() { backButton.isEnabled = currentWebView?.canGoBack ?? false; forwardButton.isEnabled = currentWebView?.canGoForward ?? false }
              
              @objc func showTabSwitcher() {
                  let alert = UIAlertController(title: "Tabs", message: "\(TabManager.shared.currentTabs.count) open", preferredStyle: .actionSheet)
                  for (i, tab) in TabManager.shared.currentTabs.enumerated() { alert.addAction(UIAlertAction(title: "\(i+1). \(tab.title.prefix(40))", style: .default) { _ in self.switchToTab(at: i) }) }
                  alert.addAction(UIAlertAction(title: "New Tab", style: .default) { _ in let _ = TabManager.shared.createNewTab(isPrivate: TabManager.shared.privateMode); TabManager.shared.currentTabIndex = TabManager.shared.currentTabs.count - 1; self.switchToTab(at: TabManager.shared.currentTabIndex); if let url = URL(string: "https://www.google.com") { self.loadURL(url) } })
                  alert.addAction(UIAlertAction(title: "Private Mode: \(TabManager.shared.privateMode ? "ON" : "OFF")", style: .default) { _ in TabManager.shared.privateMode.toggle(); TabManager.shared.currentTabIndex = 0; if TabManager.shared.currentTabs.isEmpty { let _ = TabManager.shared.createNewTab(isPrivate: TabManager.shared.privateMode) }; self.switchToTab(at: 0); self.tabsButton.setImage(UIImage(systemName: TabManager.shared.privateMode ? "lock.fill" : "square.on.square"), for: .normal) })
                  alert.addAction(UIAlertAction(title: "Close All", style: .destructive) { _ in TabManager.shared.closeAllTabs(); self.switchToTab(at: 0) })
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel)); present(alert, animated: true)
              }
              
              @objc func showMenu() {
                  let alert = UIAlertController(title: nil, message: nil, preferredStyle: .actionSheet)
                  let uaMenu = UIAlertController(title: "User Agent", message: nil, preferredStyle: .actionSheet)
                  for mode in UserAgentManager.UAMode.allCases { let isCurrent = UserAgentManager.shared.currentMode == mode; uaMenu.addAction(UIAlertAction(title: mode.displayName + (isCurrent ? " ✓" : ""), style: .default) { _ in UserAgentManager.shared.currentMode = mode; if mode == .custom { self.promptForCustomUA() } else { self.currentWebView?.reload() } }) }
                  uaMenu.addAction(UIAlertAction(title: "Cancel", style: .cancel))
                  alert.addAction(UIAlertAction(title: "User Agent", style: .default) { _ in self.present(uaMenu, animated: true) })
                  alert.addAction(UIAlertAction(title: "Bookmarks", style: .default) { _ in self.showBookmarks() })
                  alert.addAction(UIAlertAction(title: "History", style: .default) { _ in self.showHistory() })
                  alert.addAction(UIAlertAction(title: "Add Bookmark", style: .default) { _ in if let url = self.currentWebView?.url?.absoluteString, let title = self.currentWebView?.title { BookmarkManager.shared.add(title: title, url: url); let confirm = UIAlertController(title: "Saved", message: title, preferredStyle: .alert); confirm.addAction(UIAlertAction(title: "OK", style: .default)); self.present(confirm, animated: true) } })
                  alert.addAction(UIAlertAction(title: "Share", style: .default) { _ in if let url = self.currentWebView?.url { let activity = UIActivityViewController(activityItems: [url], applicationActivities: nil); self.present(activity, animated: true) } })
                  alert.addAction(UIAlertAction(title: "Clear History", style: .destructive) { _ in HistoryManager.shared.clear(); WKWebsiteDataStore.default().removeData(ofTypes: WKWebsiteDataStore.allWebsiteDataTypes(), modifiedSince: Date.distantPast) {}; let confirm = UIAlertController(title: "Cleared", message: "History cleared", preferredStyle: .alert); confirm.addAction(UIAlertAction(title: "OK", style: .default)); self.present(confirm, animated: true) })
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel)); present(alert, animated: true)
              }
              
              func promptForCustomUA() { let alert = UIAlertController(title: "Custom User Agent", message: "Enter your custom UA string", preferredStyle: .alert); alert.addTextField { $0.placeholder = "User Agent String" }; alert.addAction(UIAlertAction(title: "Save", style: .default) { _ in if let text = alert.textFields?.first?.text, !text.isEmpty { UserAgentManager.shared.customUA = text; self.currentWebView?.reload() } }); alert.addAction(UIAlertAction(title: "Cancel", style: .cancel)); present(alert, animated: true) }
              func showBookmarks() { let alert = UIAlertController(title: "Bookmarks", message: nil, preferredStyle: .actionSheet); for b in BookmarkManager.shared.bookmarks { alert.addAction(UIAlertAction(title: b.title, style: .default) { _ in if let url = URL(string: b.url) { self.loadURL(url) } }) }; alert.addAction(UIAlertAction(title: "Cancel", style: .cancel)); present(alert, animated: true) }
              func showHistory() { let alert = UIAlertController(title: "History", message: nil, preferredStyle: .actionSheet); for e in HistoryManager.shared.history.prefix(20) { alert.addAction(UIAlertAction(title: e.title, style: .default) { _ in if let url = URL(string: e.url) { self.loadURL(url) } }) }; alert.addAction(UIAlertAction(title: "Cancel", style: .cancel)); present(alert, animated: true) }
              
              func textFieldShouldReturn(_ textField: UITextField) -> Bool { textField.resignFirstResponder(); guard let text = textField.text, !text.isEmpty else { return true }; if text.hasPrefix("http://") || text.hasPrefix("https://") { if let url = URL(string: text) { loadURL(url) } } else if text.contains(".") && !text.contains(" ") { if let url = URL(string: "https://\(text)") { loadURL(url) } } else { loadSearch(text) }; return true }
              
              override func observeValue(forKeyPath keyPath: String?, of object: Any?, change: [NSKeyValueChangeKey : Any]?, context: UnsafeMutableRawPointer?) {
                  if keyPath == #keyPath(WKWebView.estimatedProgress) { progressView.progress = Float(currentWebView?.estimatedProgress ?? 0); progressView.isHidden = (currentWebView?.estimatedProgress ?? 0) >= 1.0 }
                  else if keyPath == #keyPath(WKWebView.isLoading) { let icon = (currentWebView?.isLoading == true) ? "xmark.circle" : "arrow.clockwise"; reloadButton.setImage(UIImage(systemName: icon), for: .normal) }
                  else if keyPath == #keyPath(WKWebView.url) { updateAddressBar(); updateButtons() }
              }
              
              func webView(_ webView: WKWebView, didFinish navigation: WKNavigation!) { updateAddressBar(); updateButtons(); if let url = webView.url, let title = webView.title { TabManager.shared.currentTab?.title = title; TabManager.shared.currentTab?.url = url; if !TabManager.shared.privateMode { HistoryManager.shared.addEntry(title: title, url: url.absoluteString) } } }
              func webView(_ webView: WKWebView, createWebViewWith configuration: WKWebViewConfiguration, for navigationAction: WKNavigationAction, windowFeatures: WKWindowFeatures) -> WKWebView? { if navigationAction.targetFrame == nil { webView.load(navigationAction.request) }; return nil }
              func webView(_ webView: WKWebView, runJavaScriptAlertPanelWithMessage message: String, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping () -> Void) { let alert = UIAlertController(title: nil, message: message, preferredStyle: .alert); alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler() }); present(alert, animated: true) }
              func webView(_ webView: WKWebView, runJavaScriptConfirmPanelWithMessage message: String, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping (Bool) -> Void) { let alert = UIAlertController(title: nil, message: message, preferredStyle: .alert); alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler(true) }); alert.addAction(UIAlertAction(title: "Cancel", style: .cancel) { _ in completionHandler(false) }); present(alert, animated: true) }
              func webView(_ webView: WKWebView, runJavaScriptTextInputPanelWithPrompt prompt: String, defaultText: String?, initiatedByFrame frame: WKFrameInfo, completionHandler: @escaping (String?) -> Void) { let alert = UIAlertController(title: nil, message: prompt, preferredStyle: .alert); alert.addTextField { $0.text = defaultText }; alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler(alert.textFields?.first?.text) }); alert.addAction(UIAlertAction(title: "Cancel", style: .cancel) { _ in completionHandler(nil) }); present(alert, animated: true) }
          }
          
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = BrowserViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          
          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          SWIFT

      - name: Compile Swift to binary
        run: |
          APP_NAME="Modernize"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 -framework UIKit -framework WebKit -o Payload/${APP_NAME}.app/${APP_NAME} app.swift
          chmod +x Payload/${APP_NAME}.app/${APP_NAME}

      - name: Create Info.plist
        run: |
          APP_NAME="Modernize"
          cat > Payload/${APP_NAME}.app/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>Modernize</string>
          <key>CFBundleIdentifier</key><string>com.modernize.browser</string>
          <key>CFBundleName</key><string>Modernize</string>
          <key>CFBundleDisplayName</key><string>Modernize</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>MinimumOSVersion</key><string>15.0</string>
          <key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>
          <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>
          <key>UIViewControllerBasedStatusBarAppearance</key><true/>
          <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>
          <key>NSMicrophoneUsageDescription</key><string>Modernize needs microphone for web input</string>
          <key>NSCameraUsageDescription</key><string>Modernize needs camera for web input</string>
          <key>NSLocationWhenInUseUsageDescription</key><string>Modernize needs location for web services</string>
          <key>NSPhotoLibraryUsageDescription</key><string>Modernize needs photo library for uploads</string>
          <key>CFBundleIcons</key><dict><key>CFBundlePrimaryIcon</key><dict><key>CFBundleIconFiles</key><array><string>Icon-60</string><string>Icon-76</string><string>Icon-40</string></array><key>CFBundleIconName</key><string>AppIcon</string></dict></dict>
          <key>CFBundleIcons~ipad</key><dict><key>CFBundlePrimaryIcon</key><dict><key>CFBundleIconFiles</key><array><string>Icon-60</string><string>Icon-76</string><string>Icon-40</string></array><key>CFBundleIconName</key><string>AppIcon</string></dict></dict>
          </dict></plist>
          PLIST

      - name: Create PkgInfo
        run: |
          APP_NAME="Modernize"
          printf 'APPL????' > Payload/${APP_NAME}.app/PkgInfo

      - name: Create IPA
        run: |
          APP_NAME="Modernize"
          zip -r ${APP_NAME}.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Modernize-Browser
          path: Modernize.ipa
